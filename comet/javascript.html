          });
        });
      };
      reader.readAsText(fileInput.files[0]);
    }

    /**
     * Parses a UKG CSV export client-side.
     * Rows 1–9 are metadata/header; last rows named "zz-..." are placeholders.
     * Returns clean array of { name, id, hireDate, department }.
     */
    function parseUkgCsv_(text) {
      var lines = text.split(/\r?\n/);
      var result = [];
      for (var i = 9; i < lines.length; i++) { // skip first 9 rows
        var cols = splitCsvLine_(lines[i]);
        if (cols.length < 5) continue;
        var name = (cols[0] || '').trim();
        var id = (cols[1] || '').trim();
        if (!name || !id) continue;
        if (/^zz/i.test(name)) continue; // placeholder row
        result.push({
          name: name,
          id: id,
          hireDate: (cols[2] || '').trim(),
          department: (cols[4] || '').trim(),
        });
      }
      return result;
    }

    function splitCsvLine_(line) {
      var result = [];
      var current = '';
      var inQuote = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"') {
          inQuote = !inQuote;
        } else if (ch === ',' && !inQuote) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

  // ============================================================================

  // VERSION: 0.3.5
  // ============================================================================

  var _currentHeatmapConfig = null;
  var _heatmapCanvasStates = {};  // { dayName: { isDragging: bool } }
  var _dayNamesInOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

  // Default 24-element traffic curves (hours 0-23). Values represent expected door count.
  // Pattern: slow ramp from 4 AM, peak mid-morning, taper in late afternoon.
  // Keep in sync with TRAFFIC_HEATMAP.defaultTrafficCurves in config.js.
  var HEATMAP_CONFIG_DEFAULT = {
    enabled: false,
    thresholds: { low: 100, high: 300 },
    trafficCurves: {
      //           12a 1  2  3  4  5  6  7  8   9am  10   11  12p   1    2    3    4   5pm   6   7pm   8  9pm 10 11
      Monday: [0, 0, 0, 0, 0, 0, 0, 0, 0, 75, 100, 120, 180, 140, 120, 180, 160, 225, 170, 180, 150, 0, 0, 0],
      Tuesday: [0, 0, 0, 0, 0, 0, 0, 0, 0, 75, 100, 120, 180, 140, 120, 180, 160, 225, 170, 180, 150, 0, 0, 0],
      Wednesday: [0, 0, 0, 0, 0, 0, 0, 0, 0, 75, 100, 120, 180, 140, 120, 180, 160, 225, 170, 180, 150, 0, 0, 0],

      Saturday: [0, 0, 0, 0, 0, 0, 0, 0, 0, 100, 200, 320, 330, 330, 320, 330, 320, 310, 200, 0, 0, 0, 0, 0],
      Sunday: [0, 0, 0, 0, 0, 0, 0, 0, 0, 100, 200, 310, 330, 325, 320, 320, 300, 250, 0, 0, 0, 0, 0, 0],
    },
    pool: {
      schedulingCounts: { Low: 1, Moderate: 3, High: 5 },
    },

  function loadTrafficHeatmapConfig(deptName) {
    UI.callServer('getTrafficHeatmapConfig', [deptName], function (config) {

  function renderHeatmapConfig(config) {
    var enableCheckbox = document.getElementById('heatmapEnabled');
    var controlsDiv = document.getElementById('heatmapConfigControls');
    if (!enableCheckbox || !controlsDiv) {
      console.error('heatmapEnabled or heatmapConfigControls not found');
      return;
    }

    // Thresholds
    var thresholds = config.thresholds || { low: 100, high: 300 };
    document.getElementById('heatmapLowThreshold').value = thresholds.low || 100;
    document.getElementById('heatmapHighThreshold').value = thresholds.high || 300;

    // Pool counts
    var schedulingCounts = (config.pool && config.pool.schedulingCounts) || { Low: 1, Moderate: 3, High: 5 };
    document.getElementById('poolCountLow').value = schedulingCounts.Low || 1;
    document.getElementById('poolCountModerate').value = schedulingCounts.Moderate || 3;
    document.getElementById('poolCountHigh').value = schedulingCounts.High || 5;

    // Render canvas for each day
    var canvasContainer = document.getElementById('heatmapCanvases');
    canvasContainer.innerHTML = '';

    _dayNamesInOrder.forEach(function (dayName) {
      var curve = config.trafficCurves && config.trafficCurves[dayName];
      // Ensure we have a 24-element array
      if (!Array.isArray(curve) || curve.length !== 24) {
        curve = (HEATMAP_CONFIG_DEFAULT.trafficCurves[dayName] || []).slice();
        if (_currentHeatmapConfig && _currentHeatmapConfig.trafficCurves) {
          _currentHeatmapConfig.trafficCurves[dayName] = curve;
        }
      }

      var dayDiv = document.createElement('div');
      dayDiv.style.display = 'flex';
      dayDiv.style.flexDirection = 'column';

      // Header row: day name + traffic level badge
      var headerDiv = document.createElement('div');
      headerDiv.style.display = 'flex';
      headerDiv.style.alignItems = 'center';
      headerDiv.style.gap = '0.5rem';
      headerDiv.style.marginBottom = '2px';

      var label = document.createElement('label');
      label.className = 'small fw-semibold mb-0';
      label.textContent = dayName;

      var badge = document.createElement('span');
      badge.id = 'heatmap_badge_' + dayName;
      badge.className = 'badge rounded-pill';
      badge.style.fontSize = '0.7rem';

      headerDiv.appendChild(label);
      headerDiv.appendChild(badge);

      var canvas = document.createElement('canvas');
      canvas.id = 'heatmap_canvas_' + dayName;
      canvas.style.border = '1px solid #ddd';
      canvas.style.borderRadius = '4px';
      canvas.style.cursor = 'crosshair';
      canvas.style.display = 'block';
      canvas.style.width = '100%';
      canvas.style.height = '160px';

      dayDiv.appendChild(headerDiv);
      dayDiv.appendChild(canvas);
      canvasContainer.appendChild(dayDiv);

      // Initialize canvas state
      _heatmapCanvasStates[dayName] = { isDragging: false };

      // Wire up mouse events for dragging
      canvas.addEventListener('mousedown', function (e) {
        _heatmapCanvasStates[dayName].isDragging = true;
        handleHeatmapCanvasDrag(canvas, dayName, e);
      });
      canvas.addEventListener('mousemove', function (e) {
        if (_heatmapCanvasStates[dayName].isDragging) handleHeatmapCanvasDrag(canvas, dayName, e);
      });
      canvas.addEventListener('mouseup', function () { _heatmapCanvasStates[dayName].isDragging = false; });
      canvas.addEventListener('mouseleave', function () { _heatmapCanvasStates[dayName].isDragging = false; });

      // Set canvas resolution after layout
      requestAnimationFrame(function () {
        resizeCanvas(canvas);
        redrawHeatmapCanvas(canvas, dayName);
      });
    });

    // Responsive resize
    window.addEventListener('resize', function () {
      _dayNamesInOrder.forEach(function (day) {
        var canvas = document.getElementById('heatmap_canvas_' + day);
        if (canvas) { resizeCanvas(canvas); redrawHeatmapCanvas(canvas, day); }
      });
    });
  }

  function resizeCanvas(canvas) {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
  }

  function handleHeatmapCanvasDrag(canvas, dayName, event) {
    if (!_currentHeatmapConfig) return;
    var curve = _currentHeatmapConfig.trafficCurves && _currentHeatmapConfig.trafficCurves[dayName];
    if (!curve) return;

    var rect = canvas.getBoundingClientRect();
    var mouseX = event.clientX - rect.left;
    var mouseY = event.clientY - rect.top;

    var leftPadding = 38;
    var topPadding = 8;
    var bottomPadding = 28;
    var rightPadding = 8;

    // Compute using CSS pixels (canvas is scaled by DPR but getBoundingClientRect returns CSS pixels)
    var cssWidth = rect.width;
    var cssHeight = rect.height;
    var graphWidth = cssWidth - leftPadding - rightPadding;
    var graphHeight = cssHeight - bottomPadding - topPadding;
    var baselineY = cssHeight - bottomPadding;

    // Allow dragging into the bottom padding so the user can reach 0 — relativeY is
    // clamped to [0, graphHeight] below, so values below the baseline map cleanly to 0.
    if (mouseX < leftPadding || mouseX > cssWidth - rightPadding ||
      mouseY < topPadding || mouseY > cssHeight) return;

    // Find nearest of 24 control points
    var pointSpacing = graphWidth / 24;
    var nearest = -1;
    var nearestDist = pointSpacing * 0.7; // snap within 70% of spacing

    for (var i = 0; i < 24; i++) {
      var cpX = leftPadding + (i + 0.5) * pointSpacing;
      var dist = Math.abs(mouseX - cpX);
      if (dist < nearestDist) {
        nearest = i;
        nearestDist = dist;
      }
    }

    if (nearest >= 0) {
      var maxDoorCount = getHeatmapMaxDoorCount_();
      var relativeY = Math.min(graphHeight, mouseY - topPadding);
      var doorCount = Math.round((1.0 - (relativeY / graphHeight)) * maxDoorCount);
      doorCount = Math.max(0, Math.min(maxDoorCount, doorCount));
      curve[nearest] = doorCount;
      redrawHeatmapCanvas(canvas, dayName);
    }
  }

  function getHeatmapMaxDoorCount_() {
    // Find the highest value across all curves so Y-axis scales consistently
    if (!_currentHeatmapConfig || !_currentHeatmapConfig.trafficCurves) return 500;
    var max = 100;
    _dayNamesInOrder.forEach(function (day) {
      var curve = _currentHeatmapConfig.trafficCurves[day];
      if (Array.isArray(curve)) {
        curve.forEach(function (v) { if (v > max) max = v; });
      }
    });
    // Round up to next 100 for a clean axis
    return Math.ceil(max / 100) * 100;
  }

  function redrawAllHeatmapCanvases() {
    _dayNamesInOrder.forEach(function (dayName) {
      var canvas = document.getElementById('heatmap_canvas_' + dayName);
      if (canvas) redrawHeatmapCanvas(canvas, dayName);
    });
  }

  function redrawHeatmapCanvas(canvas, dayName) {
    if (!_currentHeatmapConfig) return;
    var curve = _currentHeatmapConfig.trafficCurves && _currentHeatmapConfig.trafficCurves[dayName];
    if (!curve || curve.length !== 24) return;

    var ctx = canvas.getContext('2d');
    // Use CSS pixels for all drawing (canvas is scaled via DPR in resizeCanvas)
    var cssWidth = canvas.clientWidth || (canvas.width / (window.devicePixelRatio || 1));
    var cssHeight = canvas.clientHeight || (canvas.height / (window.devicePixelRatio || 1));
    ctx.clearRect(0, 0, cssWidth, cssHeight);

    var lowThreshold = (_currentHeatmapConfig.thresholds && _currentHeatmapConfig.thresholds.low) || 100;
    var highThreshold = (_currentHeatmapConfig.thresholds && _currentHeatmapConfig.thresholds.high) || 300;
    var maxDoorCount = getHeatmapMaxDoorCount_();

    var leftPadding = 38;
    var topPadding = 8;
    var bottomPadding = 28;
    var rightPadding = 8;
    var graphWidth = cssWidth - leftPadding - rightPadding;
    var graphHeight = cssHeight - bottomPadding - topPadding;
    var pointSpacing = graphWidth / 24;
    var baselineY = cssHeight - bottomPadding;

    function doorCountToY(v) {
      return baselineY - (v / maxDoorCount) * graphHeight;
    }

    // Build control points (one per hour 0-23, centered in each column)
    var controlPoints = [];
    for (var i = 0; i < 24; i++) {
      controlPoints.push({
        x: leftPadding + (i + 0.5) * pointSpacing,
        y: doorCountToY(curve[i] || 0),
        value: curve[i] || 0,
      });
    }

    // Helper: Catmull-Rom interpolation
    function catmullRom(p0, p1, p2, p3, t) {
      var v0 = (p2 - p0) * 0.5;
      var v1 = (p3 - p1) * 0.5;
      var t2 = t * t, t3 = t2 * t;
      return (2 * p1 - 2 * p2 + v0 + v1) * t3 + (-3 * p1 + 3 * p2 - 2 * v0 - v1) * t2 + v0 * t + p1;
    }

    // ===== Draw color zone bands (below low=green, mid=yellow, above high=red) =====
    var lowY = doorCountToY(lowThreshold);
    var highY = doorCountToY(highThreshold);

    // Red zone (high traffic — above high threshold)
    ctx.fillStyle = 'rgba(220, 53, 69, 0.07)';
    ctx.fillRect(leftPadding, topPadding, graphWidth, Math.max(0, highY - topPadding));

    // Yellow zone (moderate — between low and high)
    ctx.fillStyle = 'rgba(255, 193, 7, 0.10)';
    ctx.fillRect(leftPadding, highY, graphWidth, Math.max(0, lowY - highY));

    // Green zone (low traffic — below low threshold)
    ctx.fillStyle = 'rgba(40, 167, 69, 0.07)';
    ctx.fillRect(leftPadding, lowY, graphWidth, Math.max(0, baselineY - lowY));

    // ===== Draw axis lines =====
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(leftPadding, topPadding);
    ctx.lineTo(leftPadding, baselineY);
    ctx.lineTo(cssWidth - rightPadding, baselineY);
    ctx.stroke();

    // ===== Draw threshold lines =====
    // Low threshold (green/yellow boundary)
    ctx.strokeStyle = 'rgba(40, 167, 69, 0.6)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(leftPadding, lowY);
    ctx.lineTo(cssWidth - rightPadding, lowY);
    ctx.stroke();

    // High threshold (yellow/red boundary)
    ctx.strokeStyle = 'rgba(220, 53, 69, 0.6)';
    ctx.beginPath();
    ctx.moveTo(leftPadding, highY);
    ctx.lineTo(cssWidth - rightPadding, highY);
    ctx.stroke();
    ctx.setLineDash([]);

    // ===== Build spline path =====
    function buildSplinePath() {
      ctx.beginPath();
      ctx.moveTo(controlPoints[0].x, controlPoints[0].y);
      for (var seg = 0; seg < 23; seg++) {
        var p0 = controlPoints[Math.max(0, seg - 1)];
        var p1 = controlPoints[seg];
        var p2 = controlPoints[seg + 1];
        var p3 = controlPoints[Math.min(23, seg + 2)];
        for (var ti = 0.05; ti <= 1; ti += 0.05) {
          ctx.lineTo(
            catmullRom(p0.x, p1.x, p2.x, p3.x, ti),
            catmullRom(p0.y, p1.y, p2.y, p3.y, ti)
          );
        }
      }
    }

    // ===== Draw filled area under curve =====
    buildSplinePath();
    ctx.lineTo(controlPoints[23].x, baselineY);
    ctx.lineTo(controlPoints[0].x, baselineY);
    ctx.closePath();
    ctx.fillStyle = 'rgba(52, 168, 224, 0.20)';
    ctx.fill();

    // ===== Draw curve stroke =====
    buildSplinePath();
    ctx.strokeStyle = 'rgba(52, 168, 224, 0.85)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // ===== Draw control point dots (all 24 hours, with value labels) =====
    for (var i = 0; i < 24; i++) {
      var pt = controlPoints[i];
      var dotRadius = pt.value > 0 ? 5 : 3;
      ctx.fillStyle = pt.value > highThreshold ? '#dc3545' : pt.value > lowThreshold ? '#ffc107' : '#198754';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, dotRadius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.stroke();

      // Draw door count number above each dot (skip zeros to reduce clutter)
      if (pt.value > 0) {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(String(pt.value), pt.x, pt.y - dotRadius - 2);
      }
    }

    // ===== X-axis labels (every 3 hours: 12a, 3a, 6a, 9a, 12p, 3p, 6p, 9p) =====
    var xLabels = ['12a', '3a', '6a', '9a', '12p', '3p', '6p', '9p'];
    ctx.fillStyle = '#888';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (var i = 0; i < 8; i++) {
      var hourIndex = i * 3;
      var xPos = leftPadding + (hourIndex + 0.5) * pointSpacing;
      ctx.fillText(xLabels[i], xPos, baselineY + 4);
    }

    // ===== Y-axis labels =====
    ctx.fillStyle = '#888';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    [0, lowThreshold, highThreshold, maxDoorCount].forEach(function (v) {
      if (v > maxDoorCount) return;
      var y = doorCountToY(v);
      if (y < topPadding + 4 || y > baselineY - 4) return; // skip if clipped
      ctx.fillText(String(v), leftPadding - 4, y);
    });

    // ===== Update traffic level badge =====
    var badge = document.getElementById('heatmap_badge_' + dayName);
    if (badge) {
      var dominantLevel = computeDayTrafficLevel_(curve, lowThreshold, highThreshold);
      if (dominantLevel === 'High') {
        badge.textContent = 'High';
        badge.style.background = '#dc3545';
        badge.style.color = '#fff';
      } else if (dominantLevel === 'Moderate') {
        badge.textContent = 'Moderate';
        badge.style.background = '#ffc107';
        badge.style.color = '#000';
      } else {
        badge.textContent = 'Low';
        badge.style.background = '#198754';
        badge.style.color = '#fff';
      }
    }
  }

  /** Classifies a 24-hour traffic curve as Low / Moderate / High based on dominant level. */
  function computeDayTrafficLevel_(curve, lowThreshold, highThreshold) {
    var lowCount = 0, moderateCount = 0, highCount = 0;
    curve.forEach(function (v) {
      if (v >= highThreshold) highCount++;
      else if (v >= lowThreshold) moderateCount++;
      else lowCount++;
    });
    if (highCount >= moderateCount && highCount >= lowCount) return 'High';
    if (moderateCount >= lowCount) return 'Moderate';
    return 'Low';
  }


  /** Escapes HTML special characters to prevent XSS in innerHTML. */
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }


  // ------------------------------------------------------------
  // Bootstrap 5 CDN JS (needed for toast dismiss button)
  // ------------------------------------------------------------
</script>
