    function saveCodeModal_() {
      try {
        var selected = [];

        // Collect all chips and extract codes
        document.querySelectorAll('.attn-code-chip').forEach(function (chip) {
          var btn = chip.querySelector('.attn-code-chip-remove');
          if (btn && btn.dataset.code) {
            selected.push(btn.dataset.code);
          }
        });

        var isoDate = _codeModalDate;

        UI.callServer('updateAttendanceCode', [currentEmployeeId, isoDate, selected], function (response) {
          try {
            // Success if response.ok OR if response.updatedCodes exists (meaning data was returned)
            if ((response && response.ok) || (response && response.updatedCodes)) {
              var cacheKey = currentEmployeeId + '_' + currentYear;
              delete calendarYearCache[cacheKey];
              loadCalendarForEmployee(currentEmployeeId, currentYear);
              closeModal('attendanceCodeModal');
            } else {
              var errMsg = '';
              if (!response) {
                errMsg = 'No response from server';
              } else if (response.error) {
                errMsg = response.error;
              } else if (response.message) {
                errMsg = response.message;
              } else {
                errMsg = 'unknown error (response: ' + JSON.stringify(response) + ')';
              }
              console.error('[Modal] Save failed:', errMsg);
              UI.showToast('Save failed: ' + errMsg, 'error');
            }
          } catch (cbError) {
            console.error('[Modal] error in callback:', cbError);

          _updateDirtyIndicators();
        };
      }

      // Level name inputs — update pill display names in real-time without full re-render
      [0, 1, 2].forEach(function (index) {
        var input = document.getElementById('levelName' + index);
        if (!input) return;
        input.oninput = function () {
          var levelNames = getLevelNamesFromDom_();
          _updatePoolLabels_(levelNames);
          var canonicalLevels = ['Low', 'Moderate', 'High'];
          document.querySelectorAll('#heatmapGridBody .comet-traffic-pill:not(.comet-traffic-closed)').forEach(function (btn) {
            var idx = canonicalLevels.indexOf(btn.dataset.level);
            if (idx >= 0) {
              btn.textContent = levelNames[idx] || canonicalLevels[idx];
              btn.setAttribute('aria-label', btn.dataset.day + ' ' + btn.dataset.block + ': ' + (levelNames[idx] || canonicalLevels[idx]) + '. Click to change.');
            }
          });
          _dirtyState.heatmap = true;
          _updateDirtyIndicators();
        };
      });

      // Closing hour inputs — re-render grid on change, preserving unsaved pill states
      ['closeHourWeekday', 'closeHourSaturday', 'closeHourSunday'].forEach(function (id) {
        var input = document.getElementById(id);
        if (!input) return;
        input.onchange = function () {
          if (!_heatmapConfig) return;
          // Snapshot current pill states so unsaved edits survive the re-render
          var currentBlocks = {};
          document.querySelectorAll('#heatmapGridBody .comet-traffic-pill:not(.comet-traffic-closed)').forEach(function (btn) {
            if (!currentBlocks[btn.dataset.day]) currentBlocks[btn.dataset.day] = {};
            currentBlocks[btn.dataset.day][btn.dataset.block] = btn.dataset.level;
          });
          _heatmapConfig.trafficBlocks = currentBlocks;
          _heatmapConfig.closingHours = getClosingHoursFromDom_();
          _heatmapConfig.levelNames = getLevelNamesFromDom_();
          renderHeatmapGrid_(_heatmapConfig);
          _dirtyState.heatmap = true;
          _updateDirtyIndicators();
        };
      });
    }

    function _populateSettingsDeptSelect(departments) {
      var select = document.getElementById('settingsDept');
      if (!select) return;
      select.innerHTML = '<option value="">Select a department</option>'
        + (departments || []).map(function (dept) {
          return '<option value="' + esc(dept) + '">' + esc(dept) + '</option>';
        }).join('');
    }

    function _initializeAccordions() {
      // Use onclick (not addEventListener) so re-entrant onShow calls don't accumulate handlers.
      document.querySelectorAll('.comet-accordion-header').forEach(function (header) {
        header.onclick = function (e) {
          e.preventDefault();
          var card = this.closest('.comet-accordion-card');
          if (!card) return;

          var isOpen = card.classList.contains('open');
          card.classList.toggle('open', !isOpen);
          this.setAttribute('aria-expanded', !isOpen);
        };

        // Track changes in the accordion body for dirty state — also use onchange to avoid accumulation.
        var body = header.nextElementSibling;
        if (body) {
          body.onchange = function () {
            var sectionId = body.id;
            if (sectionId.includes('shifts')) _dirtyState.shifts = true;
            else if (sectionId.includes('roles')) _dirtyState.roles = true;
            else if (sectionId.includes('schedule-prefs')) _dirtyState.schedulePrefs = true;
            else if (sectionId.includes('engine')) _dirtyState.engineOptions = true;
            else if (sectionId.includes('heatmap')) _dirtyState.heatmap = true;
            _updateDirtyIndicators();
          };
        }
      });
    }

    function _updateDirtyIndicators() {
      // Add • to accordion headers that have unsaved changes
      document.querySelectorAll('.comet-accordion-header').forEach(function (header) {
        var span = header.querySelector('span:first-child');
        if (!span) return;
        var text = span.textContent.replace(' •', '');
        var body = header.nextElementSibling;
        var sectionId = body ? body.id : '';
        var isDirty = false;
        if (sectionId.includes('shifts')) isDirty = _dirtyState.shifts;
        else if (sectionId.includes('roles')) isDirty = _dirtyState.roles;
        else if (sectionId.includes('schedule-prefs')) isDirty = _dirtyState.schedulePrefs;
        else if (sectionId.includes('engine')) isDirty = _dirtyState.engineOptions;
        else if (sectionId.includes('heatmap')) isDirty = _dirtyState.heatmap;
        span.textContent = isDirty ? text + ' •' : text;
      });
    }

    function loadDeptSettings_(dept) {
      UI.callServer('getDeptSettings', dept, function (data) {
        var accordionContainer = document.getElementById('settingsAccordion');
        if (accordionContainer) accordionContainer.style.display = '';

        renderDeptSettings_(data);
        _dirtyState = { shifts: false, roles: false, schedulePrefs: false, engineOptions: false, heatmap: false };
        _updateDirtyIndicators();
      });

      // Load heatmap config separately (stored in a different backend key)
      UI.callServer('getTrafficHeatmapConfig', [dept], function (config) {
        _heatmapConfig = config;
        renderHeatmapGrid_(config);
        _dirtyState.heatmap = false;
        _updateDirtyIndicators();
      });
    }

    function renderDeptSettings_(data) {
      // Auto-open the first accordion (Shift Definitions) for visibility
      var firstCard = document.querySelector('.comet-accordion-card');
      if (firstCard) {
        firstCard.classList.add('open');
        var firstHeader = firstCard.querySelector('.comet-accordion-header');
        if (firstHeader) firstHeader.setAttribute('aria-expanded', 'true');
      }

      // Staffing Requirements (tbody)
      // Shift Definitions (tbody)
      var shiftBody = document.getElementById('shiftDefsBody');
      if (shiftBody) {
        shiftBody.innerHTML = (data.shifts || []).map(function (s, i) {
          return buildShiftDefRow_(s, i);
        }).join('');
        wireDeleteButtons_();
      }

      // Engine Options
      var engineOptions = data.engineOptions || { enforceRoleMinimums: true, gapFillEnabled: true };
      var enforceRoleMinToggle = document.getElementById('engineEnforceRoleMin');
      var gapFillToggle = document.getElementById('engineGapFillEnabled');
      if (enforceRoleMinToggle) enforceRoleMinToggle.checked = engineOptions.enforceRoleMinimums !== false;
      if (gapFillToggle) gapFillToggle.checked = engineOptions.gapFillEnabled !== false;

      // Load roles data
      loadRolesData_(data);

      // Load schedule preferences (employee day-off and shift assignments)
      loadSchedulePrefsData_(data);
    }

    function loadRolesData_(deptData) {
      var roles = deptData.roles || [];

      renderRoleDefinitions_(roles);

      // Get all employees and filter by dept
      UI.callServer('getEmployeeList', undefined, function (empData) {
        var empList = (empData && empData.data && empData.data.employees) || (empData && empData.employees);
        if (empList && Array.isArray(empList)) {
          var allEmployees = empList;
          var normalizedDept = _currentDept.toLowerCase().trim();
          var deptEmployees = allEmployees.filter(function (emp) {
            return emp.department.toLowerCase().trim() === normalizedDept;
          });

          // Column H and I (emp.role, emp.qualifiedRoles) are the single source of truth; Settings JSON is fallback
          // and the source for qualified roles (which have no dedicated sheet column).
          deptEmployees.forEach(function (emp) {
            emp.primaryRole = emp.role || '';
            emp.qualifiedRoles = emp.qualifiedRoles ? emp.qualifiedRoles.split(',').map(function (r) { return r.trim(); }).filter(Boolean) : [];
          });

          renderEmployeeRoleTable_(deptEmployees, roles);
        }
      });

      renderRoleMinimumsCoverage_(deptData.roleMinimums || {}, roles);
    }

    function loadSchedulePrefsData_(deptData) {
      var availableShifts = (deptData.shifts || []).filter(function (s) { return s.name; });
      _shiftFtptMap = {};
      availableShifts.forEach(function (s) { _shiftFtptMap[s.name.toLowerCase()] = s.ftpt || ''; });
      UI.callServer('getEmployeeList', undefined, function (empData) {
        var empList = (empData && empData.data && empData.data.employees) || (empData && empData.employees);
        if (!empList || !Array.isArray(empList)) return;
        var normalizedDept = _currentDept.toLowerCase().trim();
        var deptEmployees = empList.filter(function (emp) {
          return emp.department.toLowerCase().trim() === normalizedDept;
        });
        deptEmployees.sort(function (a, b) { return (a.name || '').localeCompare(b.name || ''); });
        renderEmployeeSchedulePrefTable_(deptEmployees, availableShifts);
      });
    }

    var DAY_OPTIONS = ['', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

    function renderEmployeeSchedulePrefTable_(deptEmployees, availableShifts) {
      var body = document.getElementById('schedulePrefsBody');
      if (!body) return;
      if (deptEmployees.length === 0) {
        body.innerHTML = '<tr><td colspan="5" class="text-muted small text-center py-3">No employees in this department</td></tr>';
        return;
      }

      body.innerHTML = deptEmployees.map(function (emp) {
        var qualified = emp.qualifiedShifts
          ? emp.qualifiedShifts.split(',').map(function (s) { return s.trim(); }).filter(Boolean)
          : [];

        var dayOff1 = buildDaySelect_('day-off-one', emp.id, emp.dayOffPrefOne || '');
        var dayOff2 = buildDaySelect_('day-off-two', emp.id, emp.dayOffPrefTwo || '');
        var prefShift = buildShiftSelect_('pref-shift', emp.id, emp.preferredShift || '', availableShifts);

        var qualifiedChips = qualified.map(function (shiftName) {
          return buildShiftChip_(emp.id, shiftName);
        }).join('');
        var addQualifiedBtn = '<button type="button" class="btn btn-sm btn-outline-secondary btn-add-qual-shift" data-emp-id="' + esc(emp.id) + '">+ Add</button>';

        var ftptClass = emp.ftpt === 'FT' ? 'sched-pref-row-ft' : (emp.ftpt === 'LPT' ? 'sched-pref-row-lpt' : 'sched-pref-row-pt');
        return '<tr data-emp-id="' + esc(emp.id) + '" class="' + ftptClass + '">'
          + '<td>' + esc(emp.name) + '</td>'
          + '<td>' + dayOff1 + '</td>'
          + '<td>' + dayOff2 + '</td>'
          + '<td>' + prefShift + '</td>'
          + '<td class="qualified-shifts-chips">' + qualifiedChips + addQualifiedBtn + '</td>'
          + '</tr>';
      }).join('');

      body.onclick = function (e) {
        var removeBtn = e.target.closest('.shift-chip-remove');
        if (removeBtn) {
          e.preventDefault();
          removeBtn.closest('.shift-chip').remove();
          _dirtyState.schedulePrefs = true;
          _updateDirtyIndicators();
          return;
        }
        var addBtn = e.target.closest('.btn-add-qual-shift');
        if (addBtn) {
          e.preventDefault();
          showAddQualifiedShiftDropdown_(addBtn, availableShifts);
        }
      };
    }

    function buildDaySelect_(className, empId, selectedValue) {
      var select = '<select class="form-select form-select-sm ' + className + '" data-emp-id="' + esc(empId) + '">';
      DAY_OPTIONS.forEach(function (day) {
        select += '<option value="' + esc(day) + '"' + (day === selectedValue ? ' selected' : '') + '>' + (day || '— none —') + '</option>';
      });
      return select + '</select>';
    }

    function buildShiftSelect_(className, empId, selectedValue, availableShifts) {
      var select = '<select class="form-select form-select-sm ' + className + '" data-emp-id="' + esc(empId) + '">';
      select += '<option value="">— none —</option>';
      availableShifts.forEach(function (shift) {
        var name = shift.name || shift;
        var ftpt = shift.ftpt || _shiftFtptMap[name.toLowerCase()] || '';
        var style = ftpt === 'FT' ? ' style="background:#DBEAFE;color:#1E40AF;"'
                  : ftpt === 'PT' ? ' style="background:#DCFCE7;color:#166534;"'
                  : ftpt === 'LPT' ? ' style="background:#FFF7ED;color:#9A3412;"' : '';
        var label = name + (ftpt ? ' (' + ftpt + ')' : '');
        select += '<option value="' + esc(name) + '"' + (name === selectedValue ? ' selected' : '') + style + '>' + esc(label) + '</option>';
      });
      return select + '</select>';
    }

    function buildShiftChip_(empId, shiftName) {
      var ftpt = _shiftFtptMap[(shiftName || '').toLowerCase()] || '';
      var ftptClass = ftpt === 'FT' ? ' shift-chip-ft' : ftpt === 'LPT' ? ' shift-chip-lpt' : ftpt === 'PT' ? ' shift-chip-pt' : '';
      return '<span class="shift-chip' + ftptClass + '">'
        + esc(shiftName)
        + ' <button type="button" class="shift-chip-remove" data-emp-id="' + esc(empId) + '" data-shift="' + esc(shiftName) + '" aria-label="Remove ' + esc(shiftName) + '">✕</button>'
        + '</span>';
    }

    function showAddQualifiedShiftDropdown_(btn, availableShifts) {
      if (!btn || !btn.parentElement) return;
      var empId = btn.dataset.empId;
      var row = btn.closest('tr');

      var prefSelect = row.querySelector('.pref-shift');
      var usedShifts = prefSelect && prefSelect.value ? [prefSelect.value] : [];
      row.querySelectorAll('.shift-chip-remove').forEach(function (chipBtn) {
        usedShifts.push(chipBtn.dataset.shift);
      });

      var available = availableShifts.filter(function (shift) {
        var name = shift.name || shift;
        return usedShifts.indexOf(name) === -1;
      });

      if (available.length === 0) {
        UI.showToast('No additional shifts available.', 'info');
        return;
      }

      var select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      select.style.width = '150px';
      select.style.display = 'inline-block';
      available.forEach(function (shift) {
        var name = shift.name || shift;
        var ftpt = shift.ftpt || _shiftFtptMap[name.toLowerCase()] || '';
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name + (ftpt ? ' (' + ftpt + ')' : '');
        if (ftpt === 'FT')  { opt.style.background = '#DBEAFE'; opt.style.color = '#1E40AF'; }
        if (ftpt === 'PT')  { opt.style.background = '#DCFCE7'; opt.style.color = '#166534'; }
        if (ftpt === 'LPT') { opt.style.background = '#FFF7ED'; opt.style.color = '#9A3412'; }
        select.appendChild(opt);
      });

      btn.replaceWith(select);
      select.focus();

      function commitSelection() {
        var chosen = select.value;
        var chipsCell = select.closest('.qualified-shifts-chips');
        var newAddBtn = document.createElement('button');
        newAddBtn.type = 'button';
        newAddBtn.className = 'btn btn-sm btn-outline-secondary btn-add-qual-shift';
        newAddBtn.dataset.empId = empId;
        newAddBtn.textContent = '+ Add';
        select.replaceWith(newAddBtn);
        if (chosen) {
          chipsCell.insertBefore(
            document.createRange().createContextualFragment(buildShiftChip_(empId, chosen)),
            newAddBtn
          );
          _dirtyState.schedulePrefs = true;
          _updateDirtyIndicators();
        }
      }

      select.onchange = commitSelection;
      select.onblur = function () { setTimeout(commitSelection, 150); };
    }

    function collectSchedulePrefsFromDom_() {
      var updates = [];
      document.querySelectorAll('#schedulePrefsBody tr[data-emp-id]').forEach(function (tr) {
        var empId = tr.dataset.empId;
        if (!empId) return;
        var dayOff1El = tr.querySelector('.day-off-one');
        var dayOff2El = tr.querySelector('.day-off-two');
        var prefShiftEl = tr.querySelector('.pref-shift');
        var qualShifts = [];
        tr.querySelectorAll('.shift-chip-remove').forEach(function (chipBtn) {
          if (chipBtn.dataset.shift) qualShifts.push(chipBtn.dataset.shift);
        });
        updates.push({
          id: empId,
          dayOffPrefOne: dayOff1El ? dayOff1El.value : '',
          dayOffPrefTwo: dayOff2El ? dayOff2El.value : '',
          preferredShift: prefShiftEl ? prefShiftEl.value : '',
          qualifiedShifts: qualShifts.join(', '),
        });
      });
      return updates;
    }

    function renderRoleDefinitions_(roles) {
      var body = document.getElementById('roleDefsBody');
      if (!body) return;
      body.innerHTML = (roles || []).map(function (role) {
        return '<tr>'
          + '<td><input type="text" class="form-control form-control-sm role-name" value="' + esc(role.name || '') + '"></td>'
          + '<td style="text-align: center;"><input type="checkbox" class="form-check-input role-pool-checkbox" ' + (role.isPoolRole ? 'checked' : '') + '></td>'
          + '<td><button class="btn btn-sm btn-outline-danger" aria-label="Delete role row">✕</button></td>'
          + '</tr>';
      }).join('');
      document.querySelectorAll('#roleDefsBody .btn-outline-danger').forEach(function (btn) {
        btn.onclick = function () { btn.closest('tr').remove(); };
      });
    }

    function renderEmployeeRoleTable_(deptEmployees, availableRoles) {
      var body = document.getElementById('employeeRolesBody');
      if (!body) return;
      if (deptEmployees.length === 0) {
        body.innerHTML = '<tr><td colspan="3" class="text-muted small text-center py-3">No employees in this department</td></tr>';
        return;
      }

      // Sort: assigned first, then unassigned
      deptEmployees.sort(function (a, b) {
        var aAssigned = a.primaryRole ? 0 : 1;
        var bAssigned = b.primaryRole ? 0 : 1;
        if (aAssigned !== bAssigned) return aAssigned - bAssigned;
        return (a.name || '').localeCompare(b.name || '');
      });

      body.innerHTML = deptEmployees.map(function (emp) {
        var roleOptions = '<option value="">— none —</option>'
          + (availableRoles || []).map(function (role) {
            return '<option value="' + esc(role.name) + '"' + (emp.primaryRole === role.name ? ' selected' : '') + '>' + esc(role.name) + '</option>';
          }).join('');

        var qualifiedChips = (emp.qualifiedRoles || []).map(function (qRole) {
          return buildRoleChip_(emp.id, qRole);
        }).join('');

        var addQualifiedBtn = '<button type="button" class="btn btn-sm btn-outline-secondary btn-add-qualified" data-emp-id="' + esc(emp.id) + '">+ Add</button>';

        return '<tr>'
          + '<td>' + esc(emp.name) + '</td>'
          + '<td><select class="form-select form-select-sm employee-primary-role" data-emp-id="' + esc(emp.id) + '">' + roleOptions + '</select></td>'
          + '<td class="qualified-roles-chips">' + qualifiedChips + addQualifiedBtn + '</td>'
          + '</tr>';
      }).join('');

      // Single delegated handler for the whole tbody — covers initial chips and dynamically added ones.
      // Use onclick (not addEventListener) so repeated renders don't stack handlers.
      body.onclick = function (e) {
        var removeBtn = e.target.closest('.role-chip-remove');
        if (removeBtn) {
          e.preventDefault();
          removeBtn.closest('.role-chip').remove();
          _dirtyState.roles = true;
          _updateDirtyIndicators();
          return;
        }
        var addBtn = e.target.closest('.btn-add-qualified');
        if (addBtn) {
          e.preventDefault();
          // Pass the actual button element — avoids a re-query that could find the wrong employee.
          showAddQualifiedRoleDropdown_(addBtn, availableRoles);
        }
      };
    }

    function buildRoleChip_(empId, roleName) {
      return '<span class="role-chip">'
        + esc(roleName)
        + ' <button type="button" class="role-chip-remove" data-emp-id="' + esc(empId) + '" data-role="' + esc(roleName) + '" aria-label="Remove ' + esc(roleName) + '">✕</button>'
        + '</span>';
    }

    function showAddQualifiedRoleDropdown_(btn, availableRoles) {
      if (!btn || !btn.parentElement) return;
      var empId = btn.dataset.empId;
      var row = btn.closest('tr');

      // Collect roles already in use for this employee from the live DOM
      var primarySelect = row.querySelector('.employee-primary-role');
      var usedRoles = primarySelect && primarySelect.value ? [primarySelect.value] : [];
      row.querySelectorAll('.role-chip-remove').forEach(function (chipBtn) {
        usedRoles.push(chipBtn.dataset.role);
      });

      var available = (availableRoles || []).filter(function (role) {
        return usedRoles.indexOf(role.name) === -1;
      });

      if (available.length === 0) {
        UI.showToast('No additional roles available for this employee.', 'info');
        return;
      }

      var select = document.createElement('select');
      select.className = 'form-select form-select-sm';
      select.innerHTML = '<option value="">Pick a role…</option>'
        + available.map(function (role) {
          return '<option value="' + esc(role.name) + '">' + esc(role.name) + '</option>';
        }).join('');

      btn.replaceWith(select);
      select.focus();

      function restoreButton_() {
        if (!select.parentElement) return;
        var newBtn = document.createElement('button');
        newBtn.type = 'button';
        newBtn.className = 'btn btn-sm btn-outline-secondary btn-add-qualified';
        newBtn.dataset.empId = empId;
        newBtn.textContent = '+ Add';
        // No direct onclick — delegated body.onclick covers all .btn-add-qualified clicks.
        select.replaceWith(newBtn);
      }

      select.onchange = function () {
        var roleName = this.value;
        if (!roleName) return;
        select.insertAdjacentHTML('beforebegin', buildRoleChip_(empId, roleName));
        _dirtyState.roles = true;
        _updateDirtyIndicators();
        restoreButton_();
      };

      // Small delay lets onchange fire before blur dismisses the select.
      select.onblur = function () {
        setTimeout(restoreButton_, 150);
      };
    }

    function renderRoleMinimumsCoverage_(roleMinimums, availableRoles) {
      var body = document.getElementById('roleMinimumsCoverageBody');
      if (!body) return;
      body.innerHTML = Object.keys(roleMinimums).map(function (roleName) {
        var entry = roleMinimums[roleName] || {};

        var high = entry.High || 0;

          + '<td><input type="text" class="form-control form-control-sm role-min-name" value="' + esc(roleName) + '" readonly></td>'

          + '<td><input type="number" class="form-control form-control-sm role-min-moderate" value="' + moderate + '" min="0" style="width:70px;"></td>'
          + '<td><input type="number" class="form-control form-control-sm role-min-high" value="' + high + '" min="0" style="width:70px;"></td>'
          + '<td><span class="small text-muted">+' + poolAdds + ' (pool)</span></td>'
          + '<td><button class="btn btn-sm btn-outline-danger" aria-label="Delete role minimum row">✕</button></td>'
          + '</tr>';
      }).join('');
      document.querySelectorAll('#accordion-roles-minimums-body .btn-outline-danger').forEach(function (btn) {
        btn.onclick = function () { btn.closest('tr').remove(); };
      });

    function buildShiftDefRow_(s, i) {
      return '<tr data-shift-index="' + i + '">'

        + '<td><select class="form-select form-select-sm shift-ftpt">'

        + '<option value="PT"' + (s.ftpt === 'PT' ? ' selected' : '') + '>PT</option>'
        + '</select></td>'
        + '<td><input type="time" class="form-control form-control-sm shift-weekday-start" value="' + esc(s.weekdayStart || '') + '"></td>'
        + '<td><input type="time" class="form-control form-control-sm shift-sat-start" value="' + esc(s.satStart || '') + '"></td>'

        + '<td><input type="time" class="form-control form-control-sm shift-flex-latest" value="' + esc(s.flexWindowLatest || '') + '"></td>'
        + '<td><button type="button" class="btn btn-outline-danger btn-sm btn-delete-shift" aria-label="Delete shift row">✕</button></td>'
        + '</tr>';

    function wireDeleteButtons_() {
      document.querySelectorAll('.btn-delete-shift').forEach(function (btn) {
        btn.onclick = function () { btn.closest('tr').remove(); };
      });
    }

    function collectShiftsFromDom_() {
      var shifts = [];
      document.querySelectorAll('#shiftDefsBody tr').forEach(function (tr) {
        var name = tr.querySelector('.shift-name').value.trim();
        if (!name) return;
        shifts.push({
          name: name,
          ftpt: tr.querySelector('.shift-ftpt').value || 'FT',
          weekdayStart: tr.querySelector('.shift-weekday-start').value || '',
          satStart: tr.querySelector('.shift-sat-start').value || '',
          sunStart: tr.querySelector('.shift-sun-start').value || '',
          paidHours: parseFloat(tr.querySelector('.shift-hours').value) || 0,
          hasLunch: tr.querySelector('.shift-lunch').checked,
          flexEnabled: tr.querySelector('.shift-flex-enabled').checked,
          flexWindowEarliest: tr.querySelector('.shift-flex-earliest').value || '',
          flexWindowLatest: tr.querySelector('.shift-flex-latest').value || ''
        });
      });
      return shifts;
    }

    function collectEmployeeRolesFromDom_() {
      var employeeRoles = {};
      document.querySelectorAll('#employeeRolesBody tr').forEach(function (tr) {
        var select = tr.querySelector('.employee-primary-role');
        if (select) {
          var empId = select.dataset.empId;
          var primaryRole = select.value;
          var qualifiedRoles = [];
          tr.querySelectorAll('.role-chip').forEach(function (chip) {
            var roleText = chip.textContent.trim().replace('✕', '').trim();
            if (roleText) qualifiedRoles.push(roleText);
          });
          employeeRoles[empId] = {
            primary: primaryRole,
            qualified: qualifiedRoles
          };
        }
      });
      return employeeRoles;
    }

    /**
     * Renders the 7×6 traffic heat grid from config.trafficBlocks.
     * Populates level name inputs, closing time inputs, pool counts, and the grid.
     * Blocks whose startHour >= the day's closing hour render as non-interactive "Closed" cells.
     * @param {Object} config — heatmap config object
     */
    function renderHeatmapGrid_(config) {
      var enableCheckbox = document.getElementById('heatmapEnabled');
      var controls = document.getElementById('heatmapConfigControls');
      if (!enableCheckbox || !controls) return;

      enableCheckbox.checked = config.enabled || false;
      controls.style.display = config.enabled ? '' : 'none';

      // Resolve blocks, falling back to defaults if not present
      var blocks = config.trafficBlocks || JSON.parse(JSON.stringify(HEATMAP_BLOCKS_DEFAULT));

      // Resolve level names and closing hours from config (fall back to defaults)
      var levelNames = (config.levelNames && config.levelNames.length === 3)
        ? config.levelNames
        : ['Low', 'Moderate', 'High'];
      var closingHours = config.closingHours || HEATMAP_CLOSING_HOURS_DEFAULT;

      // Populate level name inputs
      [0, 1, 2].forEach(function (index) {
        var input = document.getElementById('levelName' + index);
        if (input) input.value = levelNames[index];
      });

      // Populate closing hour inputs
      var weekdayEl = document.getElementById('closeHourWeekday');
      var satEl = document.getElementById('closeHourSaturday');
      var sunEl = document.getElementById('closeHourSunday');
      if (weekdayEl) weekdayEl.value = formatHourToTimeString_(closingHours.weekday || 21);
      if (satEl) satEl.value = formatHourToTimeString_(closingHours.saturday || 18);
      if (sunEl) sunEl.value = formatHourToTimeString_(closingHours.sunday || 18);

      // Door count thresholds
      var thresholds = config.thresholds || HEATMAP_THRESHOLDS_DEFAULT;
      var lowThreshEl = document.getElementById('heatmapLowThreshold');
      var highThreshEl = document.getElementById('heatmapHighThreshold');
      if (lowThreshEl) lowThreshEl.value = thresholds.low || HEATMAP_THRESHOLDS_DEFAULT.low;
      if (highThreshEl) highThreshEl.value = thresholds.high || HEATMAP_THRESHOLDS_DEFAULT.high;

      // Pool counts and labels
      var counts = (config.pool && config.pool.schedulingCounts) || { Low: 1, Moderate: 3, High: 5 };
      var poolLow = document.getElementById('poolCountLow');
      var poolMod = document.getElementById('poolCountModerate');
      var poolHigh = document.getElementById('poolCountHigh');
      if (poolLow) poolLow.value = counts.Low || 1;
      if (poolMod) poolMod.value = counts.Moderate || 3;
      if (poolHigh) poolHigh.value = counts.High || 5;
      _updatePoolLabels_(levelNames);

      // Build dynamic thead
      var thead = document.getElementById('heatmapGridHead');
      if (thead) {
        thead.innerHTML = '<tr>'
          + '<th scope="col" class="ps-2">Day</th>'
          + HEATMAP_BLOCK_DEFS.map(function (block) {
            return '<th scope="col">' + block.label + '</th>';
          }).join('')
          + '</tr>';
      }

      // Build tbody — closed cells for blocks beyond the day's closing hour
      var tbody = document.getElementById('heatmapGridBody');
      if (!tbody) return;

      var canonicalLevels = ['Low', 'Moderate', 'High'];

      tbody.innerHTML = SETTINGS_DAY_NAMES.map(function (day) {
        var closingHour = getClosingHourForDay_(day, closingHours);
        var dayBlocks = blocks[day] || {};
        return '<tr>'
          + '<th scope="row" class="fw-semibold small align-middle ps-2">' + day + '</th>'
          + HEATMAP_BLOCK_DEFS.map(function (block) {
            if (block.startHour >= closingHour) {
              return '<td class="p-1"><span class="comet-traffic-pill comet-traffic-closed">Closed</span></td>';
            }
            var canonical = dayBlocks[block.key] || 'Low';
            var displayName = levelNames[canonicalLevels.indexOf(canonical)] || canonical;
            return '<td class="p-1">'
              + '<button type="button" class="comet-traffic-pill comet-traffic-' + canonical.toLowerCase() + '" '
              + 'data-day="' + day + '" data-block="' + block.key + '" data-level="' + canonical + '" '
              + 'aria-label="' + day + ' ' + block.label + ': ' + displayName + '. Click to change.">'
              + displayName
              + '</button>'
              + '</td>';
          }).join('')
          + '</tr>';
      }).join('');

      // Single delegated click handler — use onclick to prevent accumulation on re-render
      tbody.onclick = function (e) {
        var btn = e.target.closest('.comet-traffic-pill:not(.comet-traffic-closed)');
        if (!btn) return;
        var nextCanonical = canonicalLevels[(canonicalLevels.indexOf(btn.dataset.level) + 1) % 3];
        var currentLevelNames = getLevelNamesFromDom_();
        var displayName = currentLevelNames[canonicalLevels.indexOf(nextCanonical)] || nextCanonical;
        btn.dataset.level = nextCanonical;
        btn.textContent = displayName;
        btn.className = 'comet-traffic-pill comet-traffic-' + nextCanonical.toLowerCase();
        btn.setAttribute('aria-label', btn.dataset.day + ' ' + btn.dataset.block + ': ' + displayName + '. Click to change.');
        _dirtyState.heatmap = true;
        _updateDirtyIndicators();
      };
    }

    /** Returns closing hour (integer) for a given day name from a closingHours config object. */
    function getClosingHourForDay_(day, closingHours) {
      if (day === 'Saturday') return closingHours.saturday || 18;
      if (day === 'Sunday') return closingHours.sunday || 18;
      return closingHours.weekday || 21;
    }

    /** Reads level name inputs from DOM, returns array of 3 strings. */
    function getLevelNamesFromDom_() {
      var defaults = ['Low', 'Moderate', 'High'];
      return [0, 1, 2].map(function (index) {
        var input = document.getElementById('levelName' + index);
        return (input && input.value.trim()) || defaults[index];
      });
    }

    /** Reads door count threshold inputs from DOM, returns { low, high } integers. */
    function getThresholdsFromDom_() {
      var lowEl = document.getElementById('heatmapLowThreshold');
      var highEl = document.getElementById('heatmapHighThreshold');
      var low = parseInt(lowEl && lowEl.value, 10) || HEATMAP_THRESHOLDS_DEFAULT.low;
      var high = parseInt(highEl && highEl.value, 10) || HEATMAP_THRESHOLDS_DEFAULT.high;
      // Enforce low < high
      if (low >= high) high = low + 1;
      return { low: low, high: high };
    }

    /** Reads closing hour time inputs from DOM, returns { weekday, saturday, sunday } integers. */
    function getClosingHoursFromDom_() {
      return {
        weekday: parseTimeStringToHour_(document.getElementById('closeHourWeekday')) || 21,
        saturday: parseTimeStringToHour_(document.getElementById('closeHourSaturday')) || 18,
        sunday: parseTimeStringToHour_(document.getElementById('closeHourSunday')) || 18,
      };
    }

    /**
     * Derives representative door-count values for each level from threshold boundaries.
     * Low = midpoint of 0 and lowThreshold; Moderate = midpoint of both thresholds;
     * High = 50% above highThreshold (so it classifies unambiguously above the boundary).
     * @param {number} lowThreshold
     * @param {number} highThreshold
     * @returns {{ Low: number, Moderate: number, High: number }}
     */
    function computeLevelValues_(lowThreshold, highThreshold) {
      return {
        Low: Math.round(lowThreshold * 0.5),
        Moderate: Math.round((lowThreshold + highThreshold) / 2),
        High: Math.round(highThreshold * 1.5),
      };
    }

    /** Formats an integer hour (e.g. 21) to "HH:00" for a <input type="time"> value. */
    function formatHourToTimeString_(hour) {
      return String(hour || 0).padStart(2, '0') + ':00';
    }

    /** Parses "HH:MM" from a time input element (or string) to an integer hour. */
    function parseTimeStringToHour_(elOrStr) {
      var str = (elOrStr && typeof elOrStr === 'object') ? elOrStr.value : elOrStr;
      if (!str) return 0;
      return parseInt(str.split(':')[0], 10) || 0;
    }

    /** Updates pool headcount label spans to show custom level names. */
    function _updatePoolLabels_(levelNames) {
      var ids = ['poolLabelLow', 'poolLabelModerate', 'poolLabelHigh'];
      var defaults = ['Low', 'Moderate', 'High'];
      ids.forEach(function (id, index) {
        var el = document.getElementById(id);
        if (el) el.textContent = levelNames[index] || defaults[index];
      });
    }

    /**
     * Reads the heat grid DOM, level name inputs, closing hour inputs, and pool counts
     * into a heatmap config object ready to pass to saveTrafficHeatmapConfig.
     * Also generates synthetic 24-hour trafficCurves for the schedule engine,
     * leaving hours at 0 for time blocks beyond the day's closing hour.
     * @returns {Object} heatmap config
     */
    function collectHeatmapConfigFromDom_() {
      var enableCheckbox = document.getElementById('heatmapEnabled');
      var levelNames = getLevelNamesFromDom_();
      var closingHours = getClosingHoursFromDom_();
      var thresholds = getThresholdsFromDom_();
      var levelValues = computeLevelValues_(thresholds.low, thresholds.high);
      var trafficBlocks = {};
      var trafficCurves = {};

      // Collect only active (non-closed) pill states
      document.querySelectorAll('#heatmapGridBody .comet-traffic-pill:not(.comet-traffic-closed)').forEach(function (btn) {
        var day = btn.dataset.day;
        var block = btn.dataset.block;
        var level = btn.dataset.level;
        if (!trafficBlocks[day]) trafficBlocks[day] = {};
        trafficBlocks[day][block] = level;
      });

      // Generate synthetic 24-hour curves, zeroing out hours beyond closing time
      SETTINGS_DAY_NAMES.forEach(function (day) {
        var curve = new Array(24).fill(0);
        var dayBlocks = trafficBlocks[day] || {};
        var closingHour = getClosingHourForDay_(day, closingHours);
        HEATMAP_BLOCK_DEFS.forEach(function (block) {
          if (block.startHour >= closingHour) return;
          var value = levelValues[dayBlocks[block.key] || 'Low'];
          block.hours.forEach(function (hour) {
            if (hour < closingHour) curve[hour] = value;
          });
        });
        trafficCurves[day] = curve;
      });

      return {
        enabled: enableCheckbox ? enableCheckbox.checked : false,
        thresholds: thresholds,
        trafficBlocks: trafficBlocks,
        trafficCurves: trafficCurves,
        levelNames: levelNames,
        closingHours: closingHours,
        pool: {
          schedulingCounts: {
            Low: parseInt(document.getElementById('poolCountLow').value, 10) || 1,
            Moderate: parseInt(document.getElementById('poolCountModerate').value, 10) || 3,
            High: parseInt(document.getElementById('poolCountHigh').value, 10) || 5,
          },
        },
      };
    }

    function refreshCurrentDept() {
      if (_currentDept) loadDeptSettings_(_currentDept);
    }

    return { onShow, refreshCurrentDept };
  })();

    function _addMailingListEmail_(event) {
      var input = event.target.closest('input[data-dept]');
      if (!input) return;
      var email = input.value.trim();
      var dept = input.dataset.dept;
      if (!email || !dept) return;
      if (!_mailingListConfig[dept]) _mailingListConfig[dept] = [];
      if (_mailingListConfig[dept].indexOf(email) === -1) {
        _mailingListConfig[dept].push(email);
        input.value = '';
        renderMailingListConfig(_mailingListConfig);
      }
    }

    function handleMailingListClick_(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;

      var action = btn.dataset.action;
      var dept = btn.dataset.dept;

      if (action === 'addEmail') {
        var input = btn.parentElement.querySelector('input[data-dept="' + esc(dept) + '"]');
        if (input) {
          var event = { target: input, key: 'Enter' };
          _addMailingListEmail_(event);
        }
      } else if (action === 'removeEmail') {
        var email = btn.dataset.email;
        if (_mailingListConfig[dept]) {
          var idx = _mailingListConfig[dept].indexOf(email);
          if (idx !== -1) {
            _mailingListConfig[dept].splice(idx, 1);
            renderMailingListConfig(_mailingListConfig);
          }
        }
      }
    }

      });

    // ---- UKG Import ----

    function handleImportUKG() {
      var fileInput = document.getElementById('ukgFileInput');
      if (!fileInput.files || !fileInput.files[0]) {
        UI.showToast('Choose a CSV file first.', 'error');
        return;
      }
      var reader = new FileReader();
      reader.onload = function (e) {
        var rows = parseUkgCsv_(e.target.result);
        if (rows.length === 0) {
          UI.showToast('No valid rows found in the CSV.', 'error');
          return;
        }
        UI.callServer('importFromUKG', [rows], function (data) {
          var msg = 'Import complete — Added: ' + data.added
            + ', Updated: ' + data.updated
            + ', Skipped: ' + data.skipped;
          document.getElementById('importResult').textContent = msg;
          UI.showToast(msg, 'success');
          _employeeListLoaded = false; // Invalidate employee cache — new employees were imported
          loadEmployeeList();
          // Refresh dept dropdowns — import may have introduced new departments; invalidate cache
          _cachedDepartments = null;
          UI.callServer('getDepartments', undefined, function (deptData) {
            _cachedDepartments = deptData.departments || [];
            _populateAllDeptSelects(_cachedDepartments);
          });
        });
      };
      reader.readAsText(fileInput.files[0]);
    }

    /**
     * Parses a UKG CSV export client-side.
     * Rows 1–9 are metadata/header; last rows named "zz-..." are placeholders.
     * Normalizes names to ALL CAPS.
     * Returns clean array of { name, id, hireDate, department }.
     */
    function parseUkgCsv_(text) {
      var lines = text.split(/\r?\n/);
      var result = [];
      for (var i = 9; i < lines.length; i++) { // skip first 9 rows
        var cols = splitCsvLine_(lines[i]);
        if (cols.length < 5) continue;
        var name = (cols[0] || '').trim().toUpperCase();
        var id = (cols[1] || '').trim();
        if (!name || !id) continue;
        if (/^zz/i.test(name)) continue; // placeholder row
        result.push({
          name: name,
          id: id,
          hireDate: (cols[2] || '').trim(),
          department: (cols[4] || '').trim(),
        });
      }
      return result;
    }

    function splitCsvLine_(line) {
      var result = [];
      var current = '';
      var inQuote = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"') {
          inQuote = !inQuote;
        } else if (ch === ',' && !inQuote) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function openAttendanceCalendar(employeeId) {
      // Delegate to AttendanceCalendar module
      AttendanceCalendar.openAttendanceCalendar(employeeId);
    }

    // Holiday setup — apply H code to all employees for specified dates
    function appendHolidaysForYear(year) {
      var holidays = [
        year + '-01-01',   // New Year's Day
        year + '-05-25',   // Memorial Day (last Monday of May, approximate for most years)
        year + '-07-04',   // Independence Day
        year + '-09-07',   // Labor Day (first Monday of September, approximate)
        year + '-11-26',   // Thanksgiving (fourth Thursday of November, approximate)
        year + '-12-25',   // Christmas Day
        // Note: Easter varies yearly; user can add via calendar UI or console
      ];
      UI.callServer('appendHolidaysToAllEmployees', [holidays], function (response) {
        if (response && response.ok) {
          UI.showToast('Holidays applied to ' + response.data.count + ' dates', 'success');
        } else {
          UI.showToast('Failed to apply holidays: ' + ((response && response.error) || 'unknown error'), 'error');
        }
      });
    }

    function viewEmployeeInfractions(employeeName) {
      // First navigate to the Attendance Dashboard view
      var attendanceLink = document.querySelector('.nav-link[data-view="attendance"]');
      if (!attendanceLink) return;
      attendanceLink.click();

      // Click the Active Infractions tab and set search filter
      setTimeout(function () {
        var cnTabBtn = document.getElementById('tab-attendance-cn-btn');
        if (cnTabBtn) {
          cnTabBtn.click();
        }

        // Set the search filter and apply it
        setTimeout(function () {
          var searchInput = document.getElementById('infractionSearch');
          if (searchInput) {
            searchInput.value = employeeName;
            // Trigger input event to filter
            var event = new Event('input', { bubbles: true });
            searchInput.dispatchEvent(event);
            searchInput.focus();
          }
        }, 150);
      }, 0);
    }

    return {
      onShow,
      loadEmployeeList,
      openEmployeeEditModal,
      toggleStatus,
      openAttendanceCalendar,
      appendHolidaysForYear,
      _addMailingListEmail_,
      loadMailingListConfig,
      viewEmployeeInfractions,
    };
  })();

  /**
   * Populates every department <select> in the app from a single departments array.
   * Called on startup and after any action that might add a new department.
   */
  function _populateAllDeptSelects(departments) {
    var sel = document.getElementById('scheduleDept');
    if (!sel) return;
    var current = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    departments.forEach(function (dept) {
      var opt = document.createElement('option');
      opt.value = opt.textContent = dept;
      sel.appendChild(opt);
    });
    // Restore previous selection if it still exists
    if (current && departments.indexOf(current) !== -1) sel.value = current;
  }

  /** Escapes HTML special characters to prevent XSS in innerHTML. */
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** Navigate to Settings view and optionally open a specific accordion section. */
  function showSettings_(sectionId) {
    var navLink = document.querySelector('[data-view="settings"]');
    if (navLink) {
      navLink.click();
      if (sectionId) {
        setTimeout(function () {
          var accordion = document.getElementById('accordion-' + sectionId);
          if (accordion) {
            var header = accordion.previousElementSibling;
            if (header && !accordion.classList.contains('show')) {
              header.click();
            }
          }
        }, 100);
      }
    }
  }

  /** Focus trap: keep Tab/Shift+Tab inside modal. */
  function trapFocus_(modalEl) {
    var focusableElements = modalEl.querySelectorAll(
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
    );
    if (focusableElements.length === 0) return;

    var firstElement = focusableElements[0];
    var lastElement = focusableElements[focusableElements.length - 1];

    function handleKeyDown(e) {
      if (e.key !== 'Tab') return;
      if (e.shiftKey) {
        if (document.activeElement === firstElement) {
          e.preventDefault();
          lastElement.focus();
        }
      } else {
        if (document.activeElement === lastElement) {
          e.preventDefault();
          firstElement.focus();
        }
      }
    }

    modalEl.addEventListener('keydown', handleKeyDown);
    return function removeTrapFocus() {
      modalEl.removeEventListener('keydown', handleKeyDown);
    };
  }

  /** Show a custom confirmation modal and execute callback on confirm. */
  function showConfirm_(title, body, confirmLabel, onConfirm) {
    var modal = document.getElementById('confirmModal');
    if (!modal) {
      console.error('confirmModal not found');
      return;
    }

    document.getElementById('confirmModalTitle').textContent = title;
    document.getElementById('confirmModalBody').textContent = body;

    var confirmBtn = document.getElementById('btnConfirmAction');
    if (confirmBtn) {
      confirmBtn.textContent = confirmLabel || 'Confirm';
      confirmBtn.onclick = function () {
        closeModal('confirmModal');
        if (onConfirm) onConfirm();
      };
    }

    openModal('confirmModal');
  }

<script>
  // Initialize after Bootstrap JS is loaded
  document.addEventListener('DOMContentLoaded', function () {
    UI.init();

    // Refresh button — reloads dynamic data without navigating away.
    // window.location.reload() drops the GAS auth token and returns a blank page,
    // so instead we re-initialize all data in place.
    document.getElementById('btnRefresh').addEventListener('click', function () {
      _cachedDepartments = null; // Clear cache so next visit refetches
      UI.callServer('getDepartments', undefined, function (data) {
        _cachedDepartments = data.departments || [];
        _populateAllDeptSelects(_cachedDepartments);
      });
      AttendanceCalendar.loadActiveCNs();
      if (typeof Admin !== 'undefined') Admin.loadEmployeeList();
      if (typeof Settings !== 'undefined') Settings.refreshCurrentDept();
      UI.showToast('Refreshed.', 'success');
    });

    // Load departments on startup so dropdowns are populated immediately
    UI.callServer('getDepartments', undefined, function (data) {
      _cachedDepartments = data.departments || [];
      _populateAllDeptSelects(_cachedDepartments);
    });

    // Load CNs on startup so badge data is ready before the user visits Schedule
    AttendanceCalendar.loadActiveCNs();

    // Load employee list on startup so absence autofill and attendance search work
    // without requiring the user to visit Admin first
    Admin.loadEmployeeList();

    // Absences is the default view — trigger its onShow so the table loads
    Absences.onShow();
  });
</script>
