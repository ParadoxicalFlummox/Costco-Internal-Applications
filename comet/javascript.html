<script>
  /* ============================================================
     javascript.html — COMET Frontend JavaScript
     VERSION: 0.5.14
  
     Loaded via <?!= include('javascript') ?> at the bottom of
     index.html. All modules are plain-object namespaces; no
     bundler or framework. Communication with the server is
     exclusively via google.script.run (wrapped by UI.callServer).
     ============================================================ */


  // ------------------------------------------------------------
  // Modal Helpers
  // ------------------------------------------------------------

  function openModal(modalId) {
    var modal = document.getElementById(modalId);
    var backdrop = document.getElementById('modalBackdrop');
    if (!modal) return;
    modal.style.display = 'block';
    modal.classList.add('show');
    backdrop.style.display = 'block';
    backdrop.classList.add('show');
    document.body.classList.add('modal-open');
  }

  function closeModal(modalId) {
    var modal = document.getElementById(modalId);
    var backdrop = document.getElementById('modalBackdrop');
    if (!modal) return;
    modal.style.display = 'none';
    modal.classList.remove('show');
    var anyOpen = document.querySelectorAll('.modal.show').length > 0;
    if (!anyOpen) {
      backdrop.style.display = 'none';
      backdrop.classList.remove('show');
      document.body.classList.remove('modal-open');
    }
  }

  function setupModalButtons() {
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-modal]');
      if (btn) {
        e.preventDefault();
        closeModal(btn.dataset.modal);
      }

      var overrideBtn = e.target.closest('[data-override-type]');
      if (overrideBtn) {
        e.preventDefault();
        var overrideType = overrideBtn.dataset.overrideType;
        if (typeof handleCellOverride === 'function') {
          handleCellOverride(overrideType);
        }
      }

      var preGenBtn = document.getElementById('btnPreGenerate');
      if (e.target === preGenBtn && typeof Schedule._handlePreGenerate === 'function') {
        e.preventDefault();
        Schedule._handlePreGenerate();
      }
    });
  }


  // ------------------------------------------------------------
  // UI — Loading overlay, toast, server call wrapper
  // ------------------------------------------------------------

  var UI = (function () {
    var _loadingEl = null;
    var _toastEl = null;

    function init() {
      _loadingEl = document.getElementById('loadingOverlay');
      _toastEl = document.getElementById('cometToast');

      setupModalButtons();

      // Nav link routing
      document.querySelectorAll('.nav-link[data-view]').forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          var viewName = link.dataset.view;

          // --- Cleanup outgoing view ---
          // Close any open modals
          document.querySelectorAll('.modal.show').forEach(function (m) {
            closeModal(m.id);
          });
          // Clear schedule grid so it doesn't linger when returning
          var scheduleContainer = document.getElementById('scheduleTableContainer');
          if (scheduleContainer) {
            scheduleContainer.innerHTML = '<div class="p-3 text-comet-muted small">Select a department and week, then click Generate.</div>';
          }

          // --- Switch view ---
          document.querySelectorAll('.nav-link[data-view]').forEach(function (l) {
            l.classList.remove('active');
          });
          link.classList.add('active');
          document.querySelectorAll('.comet-view').forEach(function (v) {
            v.style.display = 'none';
          });
          var viewEl = document.getElementById('view-' + viewName);
          if (viewEl) viewEl.style.display = '';

          // Notify each module that its view became active
          if (viewName === 'schedule' && Schedule.onShow) Schedule.onShow();
          if (viewName === 'absences' && Absences.onShow) Absences.onShow();
          if (viewName === 'attendance' && AttendanceCalendar.onShow) AttendanceCalendar.onShow();
          if (viewName === 'admin' && Admin.onShow) Admin.onShow();
        });
      });

      // Snap week picker to the nearest Monday
      var weekInput = document.getElementById('scheduleWeek');
      if (weekInput) {
        weekInput.addEventListener('change', function () {
          var d = new Date(this.value + 'T00:00:00');
          var day = d.getDay(); // 0=Sun,1=Mon,...
          var diff = (day === 0) ? -6 : 1 - day;
          d.setDate(d.getDate() + diff);
          this.value = d.toISOString().slice(0, 10);
        });
        // Default to the current Monday
        var today = new Date();
        var dayOfWeek = today.getDay();
        var daysToMon = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
        today.setDate(today.getDate() + daysToMon);
        weekInput.value = today.toISOString().slice(0, 10);
      }

      // Default absence date to today
      var absDate = document.getElementById('absenceDate');
      if (absDate) {
        absDate.value = new Date().toISOString().slice(0, 10);
      }
    }

    function showLoading() {
      if (_loadingEl) _loadingEl.style.display = 'flex';
    }

    function hideLoading() {
      if (_loadingEl) _loadingEl.style.display = 'none';
    }

    function showToast(message, type) {
      // type: 'success' | 'error' | 'info'
      var toast = _toastEl;
      var body = document.getElementById('cometToastBody');
      if (!toast || !body) return;
      toast.className = 'toast align-items-center border-0 toast-' + (type || 'info');
      body.textContent = message;
      toast.style.display = 'block';
      toast.classList.add('show');
      setTimeout(function () {
        toast.classList.remove('show');
        toast.style.display = 'none';
      }, 8000); // change this to increase or decrease how long the message stays on screen.
    }

    /**
     * Thin wrapper around google.script.run that handles loading state,
     * error surfacing, and the ok/error return contract.
     *
     * @param {string}   fnName   — Name of the public function in api.js.
     * @param {any}      args     — Arguments to pass (spread as ...args).
     * @param {Function} onSuccess — Called with result.data on success.
     * @param {Function} [onError] — Optional; falls back to showToast.
     */
    function callServer(fnName, args, onSuccess, onError) {
      showLoading();
      var runner = google.script.run
        .withSuccessHandler(function (result) {
          hideLoading();
          if (!result || !result.ok) {
            var msg = (result && result.error) ? result.error : 'Unknown server error.';
            if (onError) {
              onError(msg);
            } else {
              showToast(msg, 'error');
            }
            return;
          }
          onSuccess(result.data);
        })
        .withFailureHandler(function (err) {
          hideLoading();
          var msg = err && err.message ? err.message : String(err);
          if (onError) {
            onError(msg);
          } else {
            showToast(msg, 'error');
          }
        });

      var fn = runner[fnName];
      if (!fn) {
        hideLoading();
        var errMsg = 'api function "' + fnName + '" not found.';
        if (onError) onError(errMsg); else showToast(errMsg, 'error');
        return;
      }

      if (Array.isArray(args)) {
        fn.apply(runner, args);
      } else if (args !== undefined) {
        fn.call(runner, args);
      } else {
        fn.call(runner);
      }
    }

    return { init, showLoading, hideLoading, showToast, callServer };
  })();


  // ------------------------------------------------------------
  // CNStore — Shared active-CN data for CN badge display
  // ------------------------------------------------------------

  var CNStore = (function () {
    var _cns = [];

    function set(cns) {
      _cns = cns || [];
    }

    /** Returns true if the employee has at least one active CN. */
    function hasActiveCN(employeeId) {
      return _cns.some(function (cn) {
        return String(cn.employeeId) === String(employeeId);
      });
    }

    /** Returns the active CN with the fewest days remaining for this employee. */
    function getUrgentCN(employeeId) {
      var matching = _cns.filter(function (cn) {
        return String(cn.employeeId) === String(employeeId);
      });
      if (matching.length === 0) return null;
      matching.sort(function (a, b) { return a.daysUntilExpiry - b.daysUntilExpiry; });
      return matching[0];
    }

    return { set, hasActiveCN, getUrgentCN };
  })();


  // ------------------------------------------------------------
  // Schedule Module
  // ------------------------------------------------------------

  var Schedule = (function () {
    var _weekSheetName = null;
    var _weekGrid = null;
    var _employeeList = null;
    var _staffingRequirements = null;
    var _currentDept = null;
    var _currentMonday = null;
    var _pendingOverride = null; // { employeeId, dayIndex }
    var _lastChangedCell = null; // { employeeId, dayIndex } — used for change highlighting
    var _lastSheetAgeWarningTime = null; // Memoization to prevent duplicate toasts
    var _crossDeptHoursCache = {}; // Cached cross-dept hours: { empId: { totalHours, assignments } }

    function onShow() {
      // Refresh dept dropdown in case departments were added since startup
      UI.callServer('getDepartments', undefined, function (data) {
        _populateAllDeptSelects(data.departments || []);
      });

      // Check if Employees sheet is stale and show warning toast if needed
      _checkAndShowSheetAgeWarning();

      // Schedule tab: department selector
      var deptSelect = document.getElementById('scheduleDept');
      if (deptSelect) {
        deptSelect.onchange = function () {
          var dept = this.value;
          var tabsContainer = document.getElementById('scheduleTabsContainer');
          if (!tabsContainer) {
            console.error('scheduleTabsContainer not found');
            return;
          }

          // Clear any previously loaded schedule so the old dept's data is not
          // visible while the new dept is loading or has no schedule yet.
          _weekSheetName = null;
          _weekGrid = null;
          _employeeList = null;
          _staffingRequirements = null;
          _currentMonday = null;
          _currentDept = null;

          // Clear the entire schedule table container (week tabs + grid) so no
          // stale content from the previous dept remains visible.
          var tableContainer = document.getElementById('scheduleTableContainer');
          if (tableContainer) {
            tableContainer.innerHTML = '<div class="p-3 text-comet-muted small">Loading schedule…</div>';
          }

          if (dept) {
            _currentDept = dept;
            loadDeptSettings(dept);
            loadTrafficHeatmapConfig(dept);
            tabsContainer.style.display = '';
            initializeScheduleTabs();

            // Auto-load the most recent schedule for this dept so the manager
            // sees something immediately without having to click Load Existing.
            _autoLoadLatestSchedule(dept);
          } else {
            tabsContainer.style.display = 'none';
            if (tableContainer) {
              tableContainer.innerHTML = '<div class="p-3 text-comet-muted small">Select a week and click Generate.</div>';
            }
          }
        };
      } else {
        console.error('scheduleDept select element not found');
      }

      // Helper: Initialize tab switching
      function initializeScheduleTabs() {
        var tabButtons = document.querySelectorAll('#scheduleTabsContainer [data-bs-toggle="tab"]');
        tabButtons.forEach(function (btn) {
          btn.onclick = function (e) {
            e.preventDefault();
            var targetId = btn.getAttribute('data-bs-target');
            if (!targetId) return;

            // Remove active class from all buttons and panes
            tabButtons.forEach(function (b) { b.classList.remove('active'); });
            document.querySelectorAll('#scheduleTabsContainer .tab-pane').forEach(function (pane) {
              pane.classList.remove('show', 'active');
            });

            // Add active class to clicked button and target pane
            btn.classList.add('active');
            var targetPane = document.querySelector(targetId);
            if (targetPane) {
              targetPane.classList.add('show', 'active');

              // If switching to heatmap tab, trigger canvas resize and redraw
              if (targetId === '#tab-supervisor') {
                requestAnimationFrame(function () {
                  _dayNamesInOrder.forEach(function (day) {
                    var canvas = document.getElementById('heatmap_canvas_' + day);
                    if (canvas) {
                      resizeCanvas(canvas);
                      redrawHeatmapCanvas(canvas, day);
                    }
                  });
                });
              }
            }
          };
        });
      }

      // Schedule tab buttons
      document.getElementById('btnGenerate').onclick = handleGenerate;
      document.getElementById('btnLoadExisting').onclick = handleLoadExisting;
      document.getElementById('btnAddShift').onclick = function () {
        var shifts = collectShiftsFromDom();
        shifts.push({ name: '', ftpt: 'FT', weekdayStart: '08:00', satStart: '', sunStart: '', paidHours: 8, hasLunch: true, flexEnabled: true, flexWindowEarliest: '', flexWindowLatest: '' });
        var newRow = buildShiftDefRow(shifts[shifts.length - 1], shifts.length - 1);
        document.getElementById('shiftDefsBody').insertAdjacentHTML('beforeend', newRow);
        wireDeleteButtons();
      };

      // Heatmap config handlers
      var heatmapEnableCheckbox = document.getElementById('heatmapEnabled');
      if (heatmapEnableCheckbox) {
        heatmapEnableCheckbox.onchange = function () {
          if (_currentHeatmapConfig) {
            _currentHeatmapConfig.enabled = this.checked;
            var controlsDiv = document.getElementById('heatmapConfigControls');
            controlsDiv.style.display = this.checked ? '' : 'none';
          }
        };
      }

      var lowThresholdInput = document.getElementById('heatmapLowThreshold');
      var highThresholdInput = document.getElementById('heatmapHighThreshold');
      if (lowThresholdInput) {
        lowThresholdInput.oninput = function () {
          if (_currentHeatmapConfig) {
            _currentHeatmapConfig.thresholds.low = parseInt(this.value, 10) || 0;
            redrawAllHeatmapCanvases();
          }
        };
      }
      if (highThresholdInput) {
        highThresholdInput.oninput = function () {
          if (_currentHeatmapConfig) {
            _currentHeatmapConfig.thresholds.high = parseInt(this.value, 10) || 0;
            redrawAllHeatmapCanvases();
          }
        };
      }

      var resetHeatmapBtn = document.getElementById('btnResetHeatmap');
      if (resetHeatmapBtn) {
        resetHeatmapBtn.onclick = function () {
          // Preserve the current enabled state so canvases stay visible and
          // the feature toggle isn't accidentally turned off by a curve reset.
          var wasEnabled = _currentHeatmapConfig && _currentHeatmapConfig.enabled;
          _currentHeatmapConfig = JSON.parse(JSON.stringify(HEATMAP_CONFIG_DEFAULT));
          _currentHeatmapConfig.enabled = !!wasEnabled;
          renderHeatmapConfig(_currentHeatmapConfig);
        };
      }

      document.getElementById('btnSaveStaffingReqs').onclick = function () {
        var dept = document.getElementById('scheduleDept').value;
        if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
        var staffingReqs = collectStaffingReqsFromDom();
        UI.callServer('saveDeptSettings', [dept, { staffingReqs }], function () {
          UI.showToast('Staffing requirements saved.', 'success');
        });
      };
      document.getElementById('btnSaveShiftDefs').onclick = function () {
        var dept = document.getElementById('scheduleDept').value;
        if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
        var shifts = collectShiftsFromDom();
        UI.callServer('saveDeptSettings', [dept, { shifts }], function () {
          UI.showToast('Shift definitions saved.', 'success');
        });
      };
      document.getElementById('btnSaveHeatmapConfig').onclick = function () {
        if (!_currentHeatmapConfig) {
          UI.showToast('No heatmap config loaded.', 'error');
          return;
        }
        var dept = document.getElementById('scheduleDept').value;
        if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
        // Collect pool counts from DOM
        _currentHeatmapConfig.pool.schedulingCounts.Low = parseInt(document.getElementById('poolCountLow').value, 10) || 0;
        _currentHeatmapConfig.pool.schedulingCounts.Moderate = parseInt(document.getElementById('poolCountModerate').value, 10) || 0;
        _currentHeatmapConfig.pool.schedulingCounts.High = parseInt(document.getElementById('poolCountHigh').value, 10) || 0;
        UI.callServer('saveTrafficHeatmapConfig', [dept, _currentHeatmapConfig], function () {
          UI.showToast('Heatmap configuration saved.', 'success');
        });
      };

      document.getElementById('btnSaveEngineOptions').onclick = function () {
        var dept = document.getElementById('scheduleDept').value;
        if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
        var engineOptions = {
          enforceRoleMinimums: document.getElementById('engineEnforceRoleMin').checked,
          gapFillEnabled: document.getElementById('engineGapFillEnabled').checked,
        };
        UI.callServer('saveDeptSettings', [dept, { engineOptions: engineOptions }], function () {
          UI.showToast('Engine options saved.', 'success');
        });
      };

      document.getElementById('btnAddRoleMinimum').onclick = function () {
        var newRow = '<tr>'
          + '<td><input type="text" class="form-control form-control-sm" placeholder="Role name"></td>'
          + '<td><input type="number" class="form-control form-control-sm" value="0" min="0"></td>'
          + '<td><input type="number" class="form-control form-control-sm" value="0" min="0"></td>'
          + '<td><input type="number" class="form-control form-control-sm" value="0" min="0"></td>'
          + '<td><button class="btn btn-sm btn-outline-danger" onclick="this.closest(\'tr\').remove()">✕</button></td>'
          + '</tr>';
        document.getElementById('roleMinimumsBody').insertAdjacentHTML('beforeend', newRow);
      };

      document.getElementById('btnSaveRoleMinimums').onclick = function () {
        var dept = document.getElementById('scheduleDept').value;
        if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
        var roleMinimums = collectRoleMinimumsFromDom();
        UI.callServer('saveDeptSettings', [dept, { roleMinimums: roleMinimums }], function () {
          UI.showToast('Role minimums saved.', 'success');
        });
      };

      document.getElementById('btnAddHybridStaff').onclick = function () {
        var dept = document.getElementById('scheduleDept').value;
        // Use _currentMonday (set when a schedule is loaded/auto-loaded) rather than the
        // date picker, which may be empty when the schedule was loaded via auto-load.
        var monday = _currentMonday || document.getElementById('scheduleWeek').value;
        if (!dept || !monday) { UI.showToast('Select a department and week first.', 'error'); return; }
        UI.showToast('Adding hybrid staff...', 'info');
        UI.callServer('appendHybridEmployees', [dept, monday], function (data) {
          _weekGrid = data.weekGrid;
          _employeeList = data.employeeList;
          renderScheduleGrid();
          var msg = data.added + ' hybrid employee(s) added.';
          if (data.skipped && data.skipped.length > 0) {
            msg += ' Skipped: ' + data.skipped.map(function (s) {
              return s.name + ' (' + s.homeDept + ' not yet generated)';
            }).join(', ') + '.';
          }
          UI.showToast(msg, data.skipped && data.skipped.length > 0 ? 'warning' : 'success');
        });
      };

      // Cell override modal buttons
      document.querySelectorAll('[data-override-type]').forEach(function (btn) {
        btn.onclick = function () {
          handleCellOverride(btn.dataset.overrideType);
        };
      });
    }

    function _checkAndShowSheetAgeWarning() {
      // Memoization: only show the warning once per session or if last show was > 1 hour ago
      var now = Date.now();
      if (_lastSheetAgeWarningTime && (now - _lastSheetAgeWarningTime) < (60 * 60 * 1000)) {
        return; // Already showed warning recently, skip
      }

      UI.callServer('getEmployeeSheetAge', undefined,
        function (data) {
          var ageInDays = data.ageInDays || 0;
          var threshold = 7; // This should match EMPLOYEE_SHEET_STALENESS_THRESHOLD_DAYS from config

          if (ageInDays >= threshold) {
            var lastModDate = new Date(data.lastModified);
            var dateStr = lastModDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            var msg = 'Employee sheet is ' + ageInDays + ' days old (last updated ' + dateStr
              + '). Consider refreshing from UKG to catch recent hires/departures.';
            UI.showToast(msg, 'info');
            _lastSheetAgeWarningTime = now; // Memoize the show time
          }
        }
      );
    }

    function handleGenerate() {
      var dept = document.getElementById('scheduleDept').value;
      var monday = document.getElementById('scheduleWeek').value;
      if (!dept) { UI.showToast('Select a department first.', 'error'); return; }
      if (!monday) { UI.showToast('Select a week first.', 'error'); return; }

      _currentDept = dept;
      _currentMonday = monday;

      openPreGenModal(dept, monday);
    }

    function openPreGenModal(deptName, mondayDate) {
      // Fetch current dept settings to display in the modal
      UI.callServer('getDeptSettings', [deptName], function (data) {
        // Build the modal table body
        var dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // Convert staffingReqs array to object keyed by day for easy lookup
        var currentReqs = {};
        (data.staffingReqs || []).forEach(function (req) {
          currentReqs[req.day] = req;
        });

        var html = '';

        dayNames.forEach(function (day, idx) {
          var req = currentReqs[day] || {};
          var mode = req.mode || 'Count';
          var value = req.count || 0;

          html += '<tr>'
            + '<td><strong>' + day.substring(0, 3) + '</strong></td>'
            + '<td><input type="number" class="form-control form-control-sm" '
            + 'data-day="' + day + '" '
            + 'data-role="value" '
            + 'value="' + value + '" min="0" max="999"></td>'
            + '<td><select class="form-select form-select-sm" '
            + 'data-day="' + day + '" '
            + 'data-role="mode">'
            + '<option value="Count"' + (mode === 'Count' ? ' selected' : '') + '>Count</option>'
            + '<option value="Hours"' + (mode === 'Hours' ? ' selected' : '') + '>Hours</option>'
            + '</select></td>'
            + '</tr>';
        });

        document.getElementById('preGenTableBody').innerHTML = html;

        // Update modal title with dept and week
        var d = new Date(mondayDate + 'T00:00:00');
        var sunDate = new Date(d);
        sunDate.setDate(sunDate.getDate() + 6);
        var dateRange = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
          + ' – '
          + sunDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('preGenModalTitle').textContent = 'Generate Schedule for ' + deptName + ' — Week of ' + dateRange;

        openModal('preGenModal');
      });
    }

    function _handlePreGenerate() {
      // Collect the edits from the pre-gen modal table
      var staffingReqs = [];
      var dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

      dayNames.forEach(function (day) {
        var valueInput = document.querySelector('input[data-day="' + day + '"][data-role="value"]');
        var modeSelect = document.querySelector('select[data-day="' + day + '"][data-role="mode"]');

        if (valueInput && modeSelect) {
          staffingReqs.push({
            day: day,
            count: parseInt(valueInput.value, 10) || 0,
            mode: modeSelect.value
          });
        }
      });

      // Save the updated staffing requirements. Only save staffing reqs, not shifts
      // (this is just a pre-gen adjustment modal; full settings editing happens in Admin)
      closeModal('preGenModal');

      UI.callServer('saveDeptSettings', [_currentDept, {
        staffingReqs: staffingReqs
      }],
        function () {
          // Now generate the schedule with the new settings
          UI.callServer('generateSchedule', [_currentDept, _currentMonday], function (data) {
            _weekSheetName = data.weekSheetName;
            _weekGrid = data.weekGrid;
            _employeeList = data.employeeList;
            _staffingRequirements = data.staffingRequirements || {};
            _populateCrossDeptCache_(_currentMonday);
            renderScheduleGrid();

            // Warn about employees who ended up with all non-SHIFT days
            var unscheduled = (_employeeList || []).filter(function (emp, ei) {
              return (_weekGrid[ei] || []).every(function (cell) {
                return cell.type !== 'SHIFT';
              });
            });
            if (unscheduled.length > 0) {
              UI.showToast(
                unscheduled.length + ' employee(s) could not be scheduled — check their FT/PT and Qualified Shifts in Admin → Employee List: '
                + unscheduled.map(function (e) { return e.name; }).join(', '),
                'error'
              );
            } else {
              UI.showToast('Schedule generated.', 'success');
            }
          });
        }
      );
    }

    /**
     * Called automatically when a dept is selected. Fetches all available weeks
     * and loads the most recent one into the grid without requiring user action.
     * Falls back gracefully if no schedules exist yet.
     */
    function _autoLoadLatestSchedule(dept) {
      var today = new Date();
      var anchor = today.toISOString().slice(0, 10);
      UI.callServer('getScheduleWeeksForMonth', [dept, anchor], function (data) {
        var weeks = data.weeks || [];
        var tableContainer = document.getElementById('scheduleTableContainer');
        if (weeks.length === 0) {
          if (tableContainer) {
            tableContainer.innerHTML = '<div class="p-3 text-comet-muted small">No schedules found for ' + esc(dept) + '. Click Generate to create one.</div>';
          }
          return;
        }
        // Weeks are sorted newest-first by the API — load the most recent one.
        _buildWeekTabBar(dept, weeks, weeks[0].mondayDate);
      });
    }

    function handleLoadExisting() {
      var dept = document.getElementById('scheduleDept').value;
      var monday = document.getElementById('scheduleWeek').value;
      if (!dept) { UI.showToast('Select a department first.', 'error'); return; }

      _currentDept = dept;
      _currentMonday = monday || new Date().toISOString().slice(0, 10);

      // Load all existing weeks for the selected dept (no longer restricted to one month)
      UI.callServer('getScheduleWeeksForMonth', [dept, _currentMonday], function (data) {
        var weeks = data.weeks || [];
        if (weeks.length === 0) {
          UI.showToast('No schedules found for ' + dept + '. Click Generate to create one.', 'info');
          return;
        }
        _buildWeekTabBar(dept, weeks, monday);
      });
    }

    /**
     * Renders the week-tab bar and loads the selected (or most recent) week into the grid.
     * Used by both handleLoadExisting and _autoLoadLatestSchedule so the two code paths
     * stay in sync.
     *
     * @param {string} dept          — Department name
     * @param {Array}  weeks         — Array of { mondayDate } objects, newest-first
     * @param {string} selectedMonday — "YYYY-MM-DD" of the week to pre-select; falls back to weeks[0]
     */
    function _buildWeekTabBar(dept, weeks, selectedMonday) {
      _currentDept = dept;
      var container = document.getElementById('scheduleTableContainer');
      var tabHtml = '<div class="d-flex gap-2 flex-wrap p-2 border-bottom mb-0" id="weekTabBar">';
      weeks.forEach(function (w) {
        var d = new Date(w.mondayDate + 'T00:00:00');
        var label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        var active = w.mondayDate === selectedMonday ? ' btn-primary' : ' btn-outline-secondary';
        tabHtml += '<button class="btn btn-sm' + active + '" '
          + 'data-monday="' + esc(w.mondayDate) + '" '
          + 'onclick="Schedule._onWeekTabClick(this)">'
          + 'Week of ' + label + '</button>';
      });
      tabHtml += '</div><div id="scheduleGridInner"></div>';
      container.innerHTML = tabHtml;

      // Auto-load the selected week, or the most recent one (weeks[0]) if no match.
      var toLoad = weeks.find(function (w) { return w.mondayDate === selectedMonday; }) || weeks[0];
      _loadWeekIntoGrid(toLoad.mondayDate);
    }

    function _loadWeekIntoGrid(mondayDate) {
      var dept = _currentDept;
      UI.callServer('getScheduleForWeek', [dept, mondayDate], function (data) {
        if (!data.weekGrid) {
          document.getElementById('scheduleGridInner').innerHTML =
            '<div class="p-3 text-comet-muted small">No schedule data for this week.</div>';
          return;
        }
        _weekSheetName = data.weekSheetName;
        _weekGrid = data.weekGrid;
        _employeeList = data.employeeList;
        _staffingRequirements = data.staffingRequirements || {};
        _currentMonday = mondayDate;
        _populateCrossDeptCache_(mondayDate);
        renderScheduleGrid(true); // true = render into #scheduleGridInner
      });
    }

    function _onWeekTabClick(btn) {
      // Update active state on tab bar
      document.querySelectorAll('#weekTabBar button').forEach(function (b) {
        b.className = b.className.replace('btn-primary', 'btn-outline-secondary');
      });
      btn.className = btn.className.replace('btn-outline-secondary', 'btn-primary');
      _loadWeekIntoGrid(btn.dataset.monday);
    }

    /**
     * Clears and repopulates the cross-dept hours cache for the given week.
     * Only fires calls for employees who have secondary departments — skips everyone else.
     * Called once per week load (not on every render) to avoid redundant server round-trips.
     *
     * @param {string} mondayDate — "YYYY-MM-DD"
     */
    function _populateCrossDeptCache_(mondayDate) {
      _crossDeptHoursCache = {};
      if (!mondayDate || !_employeeList) return;
      var mondayString = String(mondayDate).split('T')[0];
      _employeeList.forEach(function (emp) {
        if (!emp.secondaryDepartments || emp.secondaryDepartments.length === 0) return;
        UI.callServer('getCrossDeptHoursForWeek', [emp.employeeId, mondayString], function (data) {
          if (data.totalHours > 0) _crossDeptHoursCache[emp.employeeId] = data;
        });
      });
    }

    function renderScheduleGrid(innerOnly) {
      var container = innerOnly
        ? (document.getElementById('scheduleGridInner') || document.getElementById('scheduleTableContainer'))
        : document.getElementById('scheduleTableContainer');
      if (!_weekGrid || !_employeeList) {
        container.innerHTML = '<div class="p-3 text-comet-muted small">No schedule data.</div>';
        return;
      }

      var html = '<table class="table table-bordered comet-schedule-table mb-0">';

      // Header row
      html += '<thead><tr>';
      html += '<th class="schedule-cell" style="min-width:180px;">Employee</th>';
      var days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      days.forEach(function (d) { html += '<th class="schedule-cell text-center">' + d + '</th>'; });
      html += '<th class="schedule-cell text-center">Hrs</th>';
      html += '</tr></thead><tbody>';

      // Employee rows
      _employeeList.forEach(function (emp, ei) {
        var isFt = emp.status === 'FT';
        var isLpt = emp.status === 'LPT';
        var isHybrid = emp.isComboParticipant;
        var rowClass = isHybrid ? 'schedule-row-hybrid' : (isFt ? 'schedule-row-ft' : (isLpt ? 'schedule-row-lpt' : 'schedule-row-pt'));
        html += '<tr class="' + rowClass + '">';
        html += '<td class="schedule-cell">' + buildNameCellHtml(emp) + '</td>';

        var totalHours = 0;
        _weekGrid[ei].forEach(function (cell, di) {
          if (cell.type === 'SHIFT') totalHours += (cell.paidHours || 0);
          html += '<td class="schedule-cell text-center" '
            + 'style="cursor:pointer;" '
            + 'data-emp-id="' + esc(emp.employeeId) + '" '
            + 'data-day-index="' + di + '" '
            + 'onclick="Schedule._onCellClick(this)">'
            + buildCellHtml(cell, isFt, isLpt)
            + '</td>';
        });

        var hrsClass = emp.underHours ? 'text-danger fw-semibold' : '';
        html += '<td class="schedule-cell text-center"><small class="' + hrsClass + '">' + totalHours.toFixed(1) + '</small></td>';
        html += '</tr>';
      });

      // Coverage row — respects staffingRequirements mode (Count vs Hours)
      html += '<tr class="schedule-coverage-row table-light">';
      html += '<td class="schedule-cell"><small class="text-comet-muted">Coverage</small></td>';
      var dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      for (var di = 0; di < 7; di++) {
        var dayReq = _staffingRequirements[dayNames[di]] || {};
        var mode = dayReq.mode || 'Count';
        var target = dayReq.value || 0;

        if (mode === 'Hours') {
          // Sum paidHours for all SHIFT cells in this day
          var totalHours = 0;
          _weekGrid.forEach(function (row) {
            if (row[di].type === 'SHIFT') totalHours += (row[di].paidHours || 0);
          });
          var label = totalHours.toFixed(1) + 'h';
          var okClass = totalHours >= target ? '' : 'text-danger fw-semibold';
          html += '<td class="schedule-cell text-center"><small class="' + okClass + '">' + label + '</small></td>';
        } else {
          // Count mode (default)
          var count = 0;
          _weekGrid.forEach(function (row) { if (row[di].type === 'SHIFT') count++; });
          var okClass = count >= target ? '' : 'text-danger fw-semibold';
          html += '<td class="schedule-cell text-center"><small class="' + okClass + '">' + count + '</small></td>';
        }
      }
      html += '<td></td></tr>';

      html += '</tbody></table>';
      container.innerHTML = html;

      // Apply change highlighting if a cell was just changed
      if (_lastChangedCell) {
        var empId = _lastChangedCell.employeeId;
        var dayIdx = _lastChangedCell.dayIndex;
        var cellElement = document.querySelector(
          'td[data-emp-id="' + esc(empId) + '"][data-day-index="' + dayIdx + '"]'
        );
        if (cellElement) {
          cellElement.classList.add('schedule-cell-changed');
        }
        _lastChangedCell = null; // Clear after applying
      }
    }

    function buildNameCellHtml(emp) {
      var cn = CNStore.getUrgentCN(emp.employeeId);
      var badge = '';
      if (cn) {
        var badgeClass = cn.daysUntilExpiry <= 30 ? 'text-danger'
          : cn.daysUntilExpiry <= 60 ? 'text-warning'
            : 'text-success';
        var title = esc(cn.rule + ' | Window: ' + cn.windowStart + '–' + cn.windowEnd
          + ' | ' + cn.daysUntilExpiry + ' days left');
        badge = '<span class="cn-badge ' + badgeClass + '" title="' + title + '">&#9679;</span>';
      }

      // Cross-department hours badge (split-shift)
      var crossDeptBadge = '';
      var crossDeptData = _crossDeptHoursCache[emp.employeeId];
      if (crossDeptData && crossDeptData.totalHours > 0 && crossDeptData.assignments && crossDeptData.assignments.length > 0) {
        // Build tooltip showing dept names and hours
        var tooltipLines = [];
        crossDeptData.assignments.forEach(function (assign) {
          tooltipLines.push(assign.hoursAssigned.toFixed(1) + 'h ' + esc(assign.deptName));
        });
        var tooltipText = tooltipLines.join(', ');
        var deptName = crossDeptData.assignments.length > 0 ? crossDeptData.assignments[0].deptName : '';
        var deptAbbrev = deptName.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase() || 'X';
        crossDeptBadge = '<span class="cross-dept-badge" title="' + esc(tooltipText) + '">'
          + crossDeptData.totalHours.toFixed(1) + 'h ' + esc(deptAbbrev)
          + '</span>';
      }

      // Parse the employee's role list — first entry is their priority role
      var roleList = (emp.primaryRole || '').split(',').map(function (r) { return r.trim(); }).filter(Boolean);
      var priorityRole = roleList[0] || '';
      var priorityRoleCssClass = 'role-priority-badge role-badge-' + priorityRole.toLowerCase().replace(/\s+/g, '-');
      var priorityRoleBadge = priorityRole
        ? '<span class="' + priorityRoleCssClass + '">' + esc(priorityRole) + '</span>'
        : '';
      var qualifiedRolesText = roleList.length > 0
        ? '<span class="role-qualified-list">' + esc(roleList.join(', ')) + '</span>'
        : '';

      return '<span class="fw-semibold">' + esc(emp.name) + '</span>' + badge + ' ' + crossDeptBadge
        + ' ' + priorityRoleBadge
        + qualifiedRolesText;
    }

    function buildCellHtml(cell, isFt, isLpt) {
      if (cell.type === 'VAC') {
        var vacHtml = '<span class="schedule-cell-vac">VAC</span>';
        return cell.locked ? '<span style="position:relative;">' + vacHtml + '<span class="lock-badge">🔒</span></span>' : vacHtml;
      }
      if (cell.type === 'RDO') {
        var rdoHtml = '<span class="schedule-cell-rdo">RDO</span>';
        return cell.locked ? '<span style="position:relative;">' + rdoHtml + '<span class="lock-badge">🔒</span></span>' : rdoHtml;
      }
      if (cell.type === 'OFF') return '<span class="schedule-cell-off">OFF</span>';
      // SHIFT
      var cls = isFt ? 'schedule-cell-ft' : (isLpt ? 'schedule-cell-lpt' : 'schedule-cell-pt');
      var shiftHtml = '<span class="' + cls + '">' + esc(cell.displayText || cell.shiftName || 'SHIFT') + '</span>';

      // Role text pill shown beneath the shift time
      var roleBadge = '';
      if (cell.role) {
        var roleColorClass = 'role-badge-' + cell.role.toLowerCase().replace(/\s+/g, '-');
        roleBadge = '<br><span class="role-badge ' + roleColorClass + '">' + esc(cell.role) + '</span>';
      }

      var content = shiftHtml + roleBadge;
      if (cell.locked) {
        return '<span title="Manager override">' + content + ' <span class="lock-badge">🔒</span></span>';
      }
      return content;
    }

    function _onCellClick(tdEl) {
      var empId = tdEl.dataset.empId;
      var dayIndex = parseInt(tdEl.dataset.dayIndex, 10);
      _pendingOverride = { employeeId: empId, dayIndex: dayIndex };

      // Update the modal title with context
      var emp = (_employeeList || []).find(function (e) { return String(e.employeeId) === String(empId); });
      var days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      var title = (emp ? esc(emp.name) : '') + ' — ' + (days[dayIndex] || '');
      document.getElementById('cellOverrideModalTitle').textContent = title;

      // Populate the shift dropdown for this department
      populateShiftSelectForModal(_currentDept);

      openModal('cellOverrideModal');
    }

    function populateShiftSelectForModal(deptName) {
      var selectEl = document.getElementById('overrideShiftSelect');
      // Clear existing options except the placeholder
      while (selectEl.options.length > 1) {
        selectEl.remove(1);
      }

      // Fetch shifts from getDeptSettings
      UI.callServer('getDeptSettings', [deptName], function (data) {
        if (!data.shifts || data.shifts.length === 0) {
          UI.showToast('No shifts found for this department.', 'warning');
          return;
        }

        // Populate dropdown with unique shift names
        var seen = {};
        data.shifts.forEach(function (shift) {
          if (!seen[shift.name]) {
            var option = document.createElement('option');
            option.value = shift.name;
            option.textContent = shift.name;
            selectEl.appendChild(option);
            seen[shift.name] = true;
          }
        });

        // Add custom option
        var customOption = document.createElement('option');
        customOption.value = '__CUSTOM__';
        customOption.textContent = 'Custom...';
        selectEl.appendChild(customOption);

        // Add event listener to show/hide custom shift inputs
        selectEl.onchange = function () {
          var customGroup = document.getElementById('customShiftGroup');
          if (this.value === '__CUSTOM__') {
            customGroup.style.display = 'block';
          } else {
            customGroup.style.display = 'none';
          }
        };
      });
    }

    function handleCellOverride(newType) {
      if (!_pendingOverride || !_weekSheetName) return;

      var shiftName = null;
      var customDisplayText = null;
      var customPaidHours = null;

      if (newType === 'SHIFT') {
        var selectEl = document.getElementById('overrideShiftSelect');
        shiftName = selectEl.value;

        if (!shiftName || shiftName === 'Choose a shift...') {
          UI.showToast('Please select a shift.', 'warning');
          return;
        }

        if (shiftName === '__CUSTOM__') {
          // Validate custom shift inputs
          var startTime = document.getElementById('customShiftStart').value;
          var endTime = document.getElementById('customShiftEnd').value;
          var hoursInput = document.getElementById('customShiftHours').value;

          if (!startTime || !endTime || !hoursInput) {
            UI.showToast('Please enter start time, end time, and paid hours.', 'warning');
            return;
          }

          var hours = parseFloat(hoursInput);
          if (isNaN(hours) || hours <= 0 || hours > 24) {
            UI.showToast('Paid hours must be between 0 and 24.', 'warning');
            return;
          }

          // Format display text as "10:00 AM - 3:00 PM"
          customDisplayText = formatTimeRange(startTime, endTime);
          customPaidHours = hours;
        }
      }

      closeModal('cellOverrideModal');

      var args = [_weekSheetName, _pendingOverride.employeeId, _pendingOverride.dayIndex, newType];
      if (shiftName) {
        args.push(shiftName);
      }
      if (customDisplayText) {
        args.push(customDisplayText);
        args.push(customPaidHours);
      }

      UI.callServer('updateCellOverride', args,
        function (data) {
          _weekGrid = data.weekGrid;
          _employeeList = data.employeeList;
          _staffingRequirements = data.staffingRequirements || {};

          // Track the changed cell for highlighting
          _lastChangedCell = {
            employeeId: _pendingOverride.employeeId,
            dayIndex: _pendingOverride.dayIndex
          };

          renderScheduleGrid();
          UI.showToast('Cell updated.', 'success');
        }
      );
      _pendingOverride = null;
    }

    // Helper to format time inputs (HH:MM) to display format (H:MM AM/PM - H:MM AM/PM)
    function formatTimeRange(startTime, endTime) {
      function formatTime(timeStr) {
        if (!timeStr) return '';
        var parts = timeStr.split(':');
        var hours = parseInt(parts[0], 10);
        var minutes = parseInt(parts[1], 10);
        var period = hours >= 12 ? 'PM' : 'AM';
        var displayHours = hours % 12 || 12;
        var minStr = minutes < 10 ? '0' + minutes : minutes;
        return displayHours + ':' + minStr + ' ' + period;
      }
      return formatTime(startTime) + ' - ' + formatTime(endTime);
    }

    // Expose click handlers and utilities for inline onclick attributes and modal population
    return {
      onShow,
      _onCellClick,
      _onWeekTabClick,
      _handlePreGenerate,
      _getCurrentDept: function () { return _currentDept; }
    };
  })();

  var Absences = (function () {
    var _employeeMap = {}; // Maps employee name → {id, department, shift}

    function onShow() {
      loadEntriesForDate(document.getElementById('absenceDate').value);
      document.getElementById('absenceDate').onchange = function () {
        loadEntriesForDate(this.value);
      };
      document.getElementById('btnNewAbsence').onclick = function () {
        clearAbsenceForm();
        openModal('absenceModal');
      };
      document.getElementById('btnSaveAbsence').onclick = handleSaveAbsence;
      document.getElementById('absenceName').oninput = handleEmployeeNameChange;

      document.getElementById('btnPrevDay').onclick = function () {
        var input = document.getElementById('absenceDate');
        var d = new Date(input.value + 'T00:00:00');
        d.setDate(d.getDate() - 1);
        input.value = d.toISOString().slice(0, 10);
        loadEntriesForDate(input.value);
      };
      document.getElementById('btnNextDay').onclick = function () {
        var input = document.getElementById('absenceDate');
        var d = new Date(input.value + 'T00:00:00');
        d.setDate(d.getDate() + 1);
        input.value = d.toISOString().slice(0, 10);
        loadEntriesForDate(input.value);
      };
    }

    function handleEmployeeNameChange() {
      var selectedName = document.getElementById('absenceName').value.trim();
      if (!selectedName || !_employeeMap[selectedName]) {
        // Clear autofilled fields if name is not found
        document.getElementById('absenceEmployeeId').value = '';
        document.getElementById('absenceDept').value = '';
        return;
      }
      // Autofill employee ID and department
      var emp = _employeeMap[selectedName];
      document.getElementById('absenceEmployeeId').value = emp.id || '';
      document.getElementById('absenceDept').value = emp.department || '';
    }

    function clearAbsenceForm() {
      document.getElementById('absenceName').value = '';
      document.getElementById('absenceEmployeeId').value = '';
      document.getElementById('absenceDept').value = '';
      document.getElementById('absenceTime').value = '';
      document.getElementById('absenceManager').value = '';
      document.getElementById('absenceScheduledShift').value = '';
      document.getElementById('absenceIsCallout').checked = false;
      document.getElementById('absenceIsFmla').checked = false;
      document.getElementById('absenceIsNoShow').checked = false;
      document.getElementById('absenceComment').value = '';
    }

    function loadEntriesForDate(dateString) {
      if (!dateString) return;
      UI.callServer('getAbsenceLogForDay', dateString, function (data) {
        renderAbsenceTable(data.entries || []);
      });
    }

    function renderAbsenceTable(entries) {
      var tbody = document.getElementById('absenceTableBody');
      if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-comet-muted small p-3">No entries.</td></tr>';
        return;
      }
      tbody.innerHTML = entries.map(function (e) {
        return '<tr>'
          + '<td>' + esc(e.name) + '</td>'
          + '<td>' + esc(e.department) + '</td>'
          + '<td>' + esc(e.time) + '</td>'
          + '<td>' + esc(e.manager || '') + '</td>'
          + '<td>' + esc(e.scheduledShift || '') + '</td>'
          + '<td class="text-center">' + (e.isCallout ? '&#10003;' : '') + '</td>'
          + '<td class="text-center">' + (e.isFmla ? '&#10003;' : '') + '</td>'
          + '<td class="text-center">' + (e.isNoShow ? '&#10003;' : '') + '</td>'
          + '<td>' + esc(e.comment) + '</td>'
          + '<td><button class="btn btn-outline-primary btn-sm" '
          + 'onclick="Absences.sendRow(' + JSON.stringify(e.sheetName) + ',' + e.rowNumber + ')">'
          + 'Send</button></td>'
          + '</tr>';
      }).join('');
    }

    function handleSaveAbsence() {
      var data = {
        name: document.getElementById('absenceName').value.trim(),
        employeeId: document.getElementById('absenceEmployeeId').value.trim(),
        department: document.getElementById('absenceDept').value.trim(),
        time: document.getElementById('absenceTime').value,
        manager: document.getElementById('absenceManager').value.trim(),
        scheduledShift: document.getElementById('absenceScheduledShift').value.trim(),
        isCallout: document.getElementById('absenceIsCallout').checked,
        isFmla: document.getElementById('absenceIsFmla').checked,
        isNoShow: document.getElementById('absenceIsNoShow').checked,
        comment: document.getElementById('absenceComment').value.trim(),
      };
      if (!data.name) { UI.showToast('Employee name is required.', 'error'); return; }

      UI.callServer('logAbsenceEntry', data, function () {
        closeModal('absenceModal');
        clearAbsenceForm();
        loadEntriesForDate(document.getElementById('absenceDate').value);
        UI.showToast('Entry saved.', 'success');
      });
    }

    function sendRow(sheetName, rowNumber) {
      UI.callServer('sendNotificationForRow', [sheetName, rowNumber], function () {
        UI.showToast('Notification sent.', 'success');
      });
    }

    /**
     * Sets the employee data and populates both the name datalist and
     * the internal _employeeMap used by autofill. Called from Admin.loadEmployeeList().
     * @param {Array} employees - List of employee objects from backend
     */
    function setEmployees(employees) {
      _employeeMap = {};
      var dl = document.getElementById('absenceEmployeeList');
      var deptDl = document.getElementById('absenceDeptList');
      if (dl) dl.innerHTML = '';
      var depts = {};

      employees.forEach(function (emp) {
        if (emp.status !== 'Active') return;
        if (dl) {
          var opt = document.createElement('option');
          opt.value = emp.name;
          dl.appendChild(opt);
        }
        if (emp.department) depts[emp.department] = true;

        // Store employee data for autofill lookup
        _employeeMap[emp.name] = {
          id: emp.id || '',
          department: emp.department || '',
        };
      });

      if (deptDl) {
        deptDl.innerHTML = '';
        Object.keys(depts).sort().forEach(function (dept) {
          var opt = document.createElement('option');
          opt.value = dept;
          deptDl.appendChild(opt);
        });
      }
    }

    return { onShow, sendRow, setEmployees };
  })();

  var AttendanceCalendar = (function () {
    var currentEmployeeId = null;
    var currentYear = new Date().getFullYear();
    var employeeCache = [];
    var calendarYearCache = {}; // Cache: { empId_year: codesObject }
    var searchInputEl = null;
    var resultsContainerEl = null;
    var _tabsInitialized = false;
    var _buttonsInitialized = false;
    var _codeModalDate = null; // ISO date currently open in the code editor modal

    var INFRACTION_CODE_LABELS = {
      'TD-1': 'TD-1 — Tardy 4–29 min',
      'TD-2': 'TD-2 — Tardy 30–119 min',
      'TD-3': 'TD-3 — Tardy 120+ min',
      NS: 'NS — No Show',
      SE: 'SE — Swipe Error',
      MP: 'MP — Meal Period',
      SZ: 'SZ — Suspension',
    };
    var OTHER_CODE_LABELS = {
      BL: 'BL — Bereavement',
      LP: 'LP — Personal Leave',
      CN: 'CN — Counseling Notice',
      FH: 'FH — Floating Holiday',
      H: 'H — Holiday',
      JD: 'JD — Jury Duty',
      SPF: 'SPF — Sick Paid Full',
      SPH: 'SPH — Sick Paid Half',
      SUF: 'SUF — Sick Unpaid Full',
      SUH: 'SUH — Sick Unpaid Half',
    };

    function onShow() {
      loadActiveCNs();
      setupCNScanHandlers();
      // Ensure employee cache is populated for the search dropdown
      if (employeeCache.length === 0) {
        UI.callServer('getEmployeeList', [], function (data) {
          setEmployeeCache((data && data.employees) || []);
          setupCalendarSearch();
        });
      } else {
        setupCalendarSearch();
      }
      setupCalendarButtons();
      initializeTabs();
    }

    function initializeTabs() {
      if (_tabsInitialized) return;
      _tabsInitialized = true;

      var tabButtons = document.querySelectorAll('#view-attendance .nav-link[data-bs-toggle="tab"]');

      if (typeof bootstrap !== 'undefined' && bootstrap.Tab) {
        tabButtons.forEach(function (button) {
          bootstrap.Tab.getOrCreateInstance(button);
        });
      } else {
        // Bootstrap JS not loaded: wire manual click handlers using CSS class toggling.
        tabButtons.forEach(function (button) {
          button.addEventListener('click', function (e) {
            e.preventDefault();
            switchAttendanceTab_(button);
          });
        });
      }
    }

    // Switches tabs by toggling Bootstrap CSS classes directly, without needing Bootstrap JS.
    function switchAttendanceTab_(activeButton) {
      var targetSelector = activeButton.dataset.bsTarget;
      var tabPane = targetSelector ? document.querySelector(targetSelector) : null;
      if (!tabPane) return;

      document.querySelectorAll('#view-attendance .nav-link[data-bs-toggle="tab"]').forEach(function (btn) {
        btn.classList.remove('active');
      });
      document.querySelectorAll('#view-attendance .tab-pane').forEach(function (pane) {
        pane.classList.remove('show', 'active');
      });

      activeButton.classList.add('active');
      tabPane.classList.add('show', 'active');
    }

    function setupCalendarButtons() {
      // Use onclick (not addEventListener) so repeated onShow calls don't accumulate handlers.
      if (_buttonsInitialized) return;
      _buttonsInitialized = true;

      var btnClear = document.getElementById('btnClearEmployee');
      var btnPrev = document.getElementById('btnPrevYear');
      var btnNext = document.getElementById('btnNextYear');

      if (btnClear) btnClear.onclick = clearSelection;
      if (btnPrev) btnPrev.onclick = prevYear;
      if (btnNext) btnNext.onclick = nextYear;

      // Code editor modal buttons
      var btnSave = document.getElementById('btnSaveAttendanceCodes');
      var btnClearCodes = document.getElementById('btnClearAttendanceCodes');
      if (btnSave) btnSave.onclick = saveCodeModal_;
      if (btnClearCodes) btnClearCodes.onclick = clearCodeModal_;

      // Delegated click on the calendar grid — open code editor for any day cell
      var grid = document.getElementById('calendarGrid');

    // ---- Tab 1: Active Infractions ----

    function setupCNScanHandlers() {
      document.getElementById('btnRunScan').onclick = function () {
        var dryRun = document.getElementById('dryRunToggle').checked;
        var sendEmail = document.getElementById('sendEmailToggle').checked;
        UI.callServer('runCNScan', [dryRun, sendEmail], function (data) {
          var proposals = data.proposals || 0;
          var issued = data.issued || 0;
          var msg;
          if (dryRun) {
            msg = 'Dry run — ' + proposals + ' proposal(s) found. Nothing written.';
          } else if (!sendEmail) {
            msg = issued + ' CN(s) logged to CN_Log. Email suppressed.';
          } else {
            msg = issued + ' CN(s) logged and notifications sent.';
          }
          UI.showToast(msg, issued > 0 || (dryRun && proposals > 0) ? 'success' : 'info');
          loadActiveCNs();
        });
      };
      document.getElementById('btnRunExpiry').onclick = function () {
        UI.callServer('runExpiryCheck', undefined, function () {
          UI.showToast('Expiry check complete.', 'success');
          loadActiveCNs();
        });
      };
    }

    function loadActiveCNs() {
      UI.callServer('getActiveCNs', undefined, function (data) {
        CNStore.set(data.cns);
        renderCNTable(data.cns || []);
      });
    }

    function renderCNTable(cns) {
      var tbody = document.getElementById('cnTableBody');
      if (!tbody) return;

      if (cns.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-comet-muted small p-3">No active CNs.</td></tr>';
        return;
      }
      tbody.innerHTML = cns.map(function (cn) {
        var days = cn.daysUntilExpiry;
        var exClass = days <= 30 ? 'cn-expiry-red'
          : days <= 60 ? 'cn-expiry-amber'
            : 'cn-expiry-green';
        return `<tr class="${exClass}">
          <td>${esc(cn.employeeName)}</td>
          <td>${esc(cn.department)}</td>
          <td>${esc(cn.rule)}</td>
          <td class="text-center">${cn.count}</td>
          <td>${esc(cn.windowStart)}</td>
          <td>${esc(cn.windowEnd)}</td>
          <td>${esc(cn.issuedAt)}</td>
          <td class="text-center fw-semibold">${days}</td>
        </tr>`;
      }).join('');
    }

    // ---- Tab 2: Employee Calendar ----

    function setupCalendarSearch() {
      searchInputEl = document.getElementById('calendarEmployeeSearch');
      resultsContainerEl = document.getElementById('calendarEmployeeResults');
      if (!searchInputEl || !resultsContainerEl) return;

      searchInputEl.addEventListener('input', function () {
        var query = searchInputEl.value.toLowerCase().trim();

        if (query.length === 0) {
          resultsContainerEl.style.display = 'none';
          return;
        }

        var filtered = employeeCache.filter(function (emp) {
          return emp.name.toLowerCase().includes(query) || emp.id.toString().includes(query);
        });

        if (filtered.length === 0) {
          resultsContainerEl.innerHTML = '<div class="comet-employee-result-item text-muted small">No matches</div>';
          resultsContainerEl.style.display = 'block';
          return;
        }

        var fragment = document.createDocumentFragment();
        filtered.forEach(function (emp) {
          var item = document.createElement('div');
          item.className = 'comet-employee-result-item';
          item.textContent = esc(emp.name) + ' (' + esc(emp.id) + ')';
          item.addEventListener('click', function () {
            selectEmployee(emp.id, emp.name);
          });
          fragment.appendChild(item);
        });
        resultsContainerEl.innerHTML = '';
        resultsContainerEl.appendChild(fragment);
        resultsContainerEl.style.display = 'block';
      });

      searchInputEl.addEventListener('blur', function () {
        setTimeout(function () {
          if (resultsContainerEl) resultsContainerEl.style.display = 'none';
        }, 200);
      });
    }

    function selectEmployee(employeeId, employeeName) {
      var emp = employeeCache.find(function (e) { return e.id === employeeId; });
      if (!emp) {
        UI.showToast('Employee not found in cache.', 'error');
        return;
      }

      currentEmployeeId = employeeId;
      currentYear = new Date().getFullYear();

      if (searchInputEl) searchInputEl.value = employeeName;
      if (resultsContainerEl) resultsContainerEl.style.display = 'none';

      var badge = document.getElementById('calendarSelectedBadge');
      var selected = document.getElementById('calendarSelectedEmployee');
      var empty = document.getElementById('calendarEmpty');
      var container = document.getElementById('calendarContainer');
      var yearDisplay = document.getElementById('calendarYearDisplay');

      if (badge) badge.textContent = employeeName;
      if (selected) selected.style.display = 'block';
      if (empty) empty.style.display = 'none';
      if (container) container.style.display = 'block';
      if (yearDisplay) yearDisplay.textContent = currentYear;

      var calendarTabBtn = document.getElementById('tab-attendance-calendar-btn');
      if (calendarTabBtn) {
        if (typeof bootstrap !== 'undefined' && bootstrap.Tab) {
          bootstrap.Tab.getOrCreateInstance(calendarTabBtn).show();
        } else {
          switchAttendanceTab_(calendarTabBtn);
        }
      }

    function clearSelection() {
      currentEmployeeId = null;
      document.getElementById('calendarEmployeeSearch').value = '';
      document.getElementById('calendarSelectedEmployee').style.display = 'none';
      document.getElementById('calendarContainer').style.display = 'none';
      document.getElementById('calendarEmpty').style.display = 'block';
      document.getElementById('calendarGrid').innerHTML = '';
    }

    function loadCalendarForEmployee(employeeId, year) {
      var cacheKey = employeeId + '_' + year;
      if (calendarYearCache[cacheKey]) {
        renderCalendarGrid(calendarYearCache[cacheKey], year);
        return;
      }

      UI.callServer('getAttendanceCalendar', [employeeId, year], function (data) {
        if (!data || !data.codes) {
          UI.showToast('Could not load calendar.', 'error');
          return;
        }
        calendarYearCache[cacheKey] = data.codes;
        renderCalendarGrid(data.codes, year);
      });
    }

    function renderCalendarGrid(codesObject, year) {
      var months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
      var daysOfWeek = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
      var grid = document.getElementById('calendarGrid');
      if (!grid) return;

      grid.innerHTML = '';
      var fragment = document.createDocumentFragment();

      for (var m = 0; m < 12; m++) {
        var monthCard = document.createElement('div');
        monthCard.className = 'comet-month-card';

        var monthHeader = document.createElement('div');
        monthHeader.className = 'comet-month-header';
        monthHeader.textContent = months[m];
        monthCard.appendChild(monthHeader);

        var dowRow = document.createElement('div');
        dowRow.className = 'comet-dow-row';
        var dowFragment = document.createDocumentFragment();
        daysOfWeek.forEach(function (day) {
          var dowCell = document.createElement('div');
          dowCell.className = 'comet-dow-cell';
          dowCell.textContent = day;
          dowFragment.appendChild(dowCell);
        });
        dowRow.appendChild(dowFragment);
        monthCard.appendChild(dowRow);

        var daysRow = document.createElement('div');
        daysRow.className = 'comet-dow-row';
        var daysFragment = document.createDocumentFragment();

        var firstDay = new Date(year, m, 1);
        var lastDay = new Date(year, m + 1, 0);
        var startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
        var daysInMonth = lastDay.getDate();

        for (var i = 0; i < startOffset; i++) {
          var emptyCell = document.createElement('div');
          emptyCell.className = 'comet-day-cell';
          daysFragment.appendChild(emptyCell);
        }

        for (var d = 1; d <= daysInMonth; d++) {
          var dayCell = document.createElement('div');
          dayCell.className = 'comet-day-cell';

          var isoDate = year + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
          dayCell.dataset.date = isoDate;
          var codes = codesObject[isoDate] || [];

          // Day number — always top-left
          var dayNum = document.createElement('div');
          dayNum.className = 'comet-day-number';
          dayNum.textContent = d;
          dayCell.appendChild(dayNum);

          // Code indicators (colored bubbles)
          if (codes.length > 0) {
            dayCell.classList.add('has-codes');
            var codesContainer = document.createElement('div');
            codesContainer.className = 'comet-codes-container';

            // Show up to 3 code bubbles; each displays the code text and is color-coded by type
            codes.slice(0, 3).forEach(function (code) {
              var dot = document.createElement('div');
              var cssClass = 'comet-code-dot attn-badge-' + code.toLowerCase();
              dot.className = cssClass;
              dot.textContent = code; // Display code text inside bubble
              dot.title = code; // Tooltip on hover
              codesContainer.appendChild(dot);
            });

            // Cap display at 3 dots; full list is visible in the code editor modal
            if (codes.length > 3) {
              codesContainer.title = 'Codes: ' + codes.join(', ') + ' — click to edit';
            }

            dayCell.appendChild(codesContainer);
          }

          daysFragment.appendChild(dayCell);
        }

        daysRow.appendChild(daysFragment);
        monthCard.appendChild(daysRow);
        fragment.appendChild(monthCard);
      }

      grid.appendChild(fragment);
    }

    function prevYear() {
      if (!currentEmployeeId) return;
      currentYear--;
      var yearDisplay = document.getElementById('calendarYearDisplay');
      if (yearDisplay) yearDisplay.textContent = currentYear;
      loadCalendarForEmployee(currentEmployeeId, currentYear);
    }

    function nextYear() {
      if (!currentEmployeeId) return;
      currentYear++;
      var yearDisplay = document.getElementById('calendarYearDisplay');
      if (yearDisplay) yearDisplay.textContent = currentYear;
      loadCalendarForEmployee(currentEmployeeId, currentYear);
    }

    // ---- Code Editor Modal ----

    function openCodeModal_(isoDate) {
      _codeModalDate = isoDate;
      var title = document.getElementById('attendanceCodeModalTitle');
      var dateLabel = document.getElementById('attendanceCodeModalDate');
      if (title) title.textContent = 'Edit Codes';
      if (dateLabel) dateLabel.textContent = isoDate;

      var cacheKey = currentEmployeeId + '_' + currentYear;
      var codesObj = calendarYearCache[cacheKey] || {};
      var codeList = codesObj[isoDate] || [];

      // Count occurrences of each code (e.g., two TD-1s → count[TD-1] = 2)
      var codeCounts = {};
      codeList.forEach(function (code) {
        codeCounts[code] = (codeCounts[code] || 0) + 1;
      });

      var infractionPicker = document.getElementById('infractionCodePicker');
      var otherPicker = document.getElementById('otherCodePicker');
      if (infractionPicker) {
        infractionPicker.innerHTML = '';
        // Tardy codes: use counters (can have multiple per day)
        ['TD-1', 'TD-2', 'TD-3'].forEach(function (code) {
          var count = codeCounts[code] || 0;
          infractionPicker.appendChild(makeCodeCounter_(code, INFRACTION_CODE_LABELS[code], count));
        });
        // Other infraction codes: use toggle buttons
        ['NS', 'SE', 'MP', 'SZ'].forEach(function (code) {
          var isActive = (codeCounts[code] || 0) > 0;
          infractionPicker.appendChild(makeCodeToggle_(code, INFRACTION_CODE_LABELS[code], isActive));
        });
      }
      if (otherPicker) {
        otherPicker.innerHTML = '';
        Object.keys(OTHER_CODE_LABELS).forEach(function (code) {
          var isActive = (codeCounts[code] || 0) > 0;
          otherPicker.appendChild(makeCodeToggle_(code, OTHER_CODE_LABELS[code], isActive));
        });
      }

      openModal('attendanceCodeModal');
    }

    function makeCodeCounter_(code, label, count) {
      var container = document.createElement('div');
      container.style.display = 'inline-flex';
      container.style.alignItems = 'center';
      container.style.gap = '4px';
      container.style.marginBottom = '4px';
      container.style.padding = '4px 8px';
      container.style.borderRadius = '4px';
      container.style.backgroundColor = '#f0f0f0';

      // Code label
      var label_ = document.createElement('span');
      label_.textContent = code;
      label_.style.fontWeight = '700';
      label_.style.minWidth = '50px';
      label_.title = label;
      label_.className = 'attn-badge-' + code.toLowerCase().replace(/\./g, '-');
      label_.style.padding = '2px 6px';
      label_.style.borderRadius = '3px';
      label_.style.color = '#fff';
      label_.style.textShadow = '0 1px 2px rgba(0,0,0,0.3)';
      container.appendChild(label_);

      // Minus button
      var btnMinus = document.createElement('button');
      btnMinus.type = 'button';
      btnMinus.textContent = '−';
      btnMinus.style.minWidth = '28px';
      btnMinus.style.padding = '2px 4px';
      btnMinus.className = 'btn btn-sm btn-outline-secondary';
      btnMinus.addEventListener('click', function () {
        if (parseInt(countDisplay.textContent) > 0) {
          countDisplay.textContent = parseInt(countDisplay.textContent) - 1;
        }
      });
      container.appendChild(btnMinus);

      // Count display
      var countDisplay = document.createElement('span');
      countDisplay.textContent = count;
      countDisplay.style.minWidth = '20px';
      countDisplay.style.textAlign = 'center';
      countDisplay.style.fontWeight = '700';
      countDisplay.title = 'Count for this code';
      countDisplay.dataset.code = code;
      container.appendChild(countDisplay);

      // Plus button
      var btnPlus = document.createElement('button');
      btnPlus.type = 'button';
      btnPlus.textContent = '+';
      btnPlus.style.minWidth = '28px';
      btnPlus.style.padding = '2px 4px';
      btnPlus.className = 'btn btn-sm btn-outline-secondary';
      btnPlus.addEventListener('click', function () {
        countDisplay.textContent = parseInt(countDisplay.textContent) + 1;
      });
      container.appendChild(btnPlus);

      return container;
    }

    function makeCodeToggle_(code, label, isActive) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.dataset.code = code;
      btn.textContent = code;
      btn.title = label;
      btn.className = 'btn btn-sm comet-code-toggle attn-badge-' + code.toLowerCase().replace(/\./g, '-');
      btn.style.marginRight = '4px';
      btn.style.marginBottom = '4px';
      if (isActive) btn.classList.add('active');
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        btn.classList.toggle('active');
      });
      return btn;
    }

    function clearCodeModal_() {
      // Clear counters (set to 0)
      document.querySelectorAll('#infractionCodePicker span[data-code], #otherCodePicker span[data-code]')
        .forEach(function (span) { span.textContent = '0'; });
      // Clear toggles (remove active class)
      document.querySelectorAll('#infractionCodePicker .comet-code-toggle, #otherCodePicker .comet-code-toggle')
        .forEach(function (btn) { btn.classList.remove('active'); });
    }

    function saveCodeModal_() {
      try {
        console.log('[Modal] saveCodeModal_ starting');
        var selected = [];

        // Read counts from tardy code counters (TD-1, TD-2, TD-3)
        document.querySelectorAll('#infractionCodePicker span[data-code]')
          .forEach(function (span) {
            var code = span.dataset.code;
            var count = parseInt(span.textContent) || 0;
            for (var i = 0; i < count; i++) {
              selected.push(code);
            }
          });

        // Read toggle states from all buttons (other codes)
        document.querySelectorAll('.comet-code-toggle.active')
          .forEach(function (btn) {
            selected.push(btn.dataset.code);
          });

        console.log('[Modal] selected codes:', selected);
        var isoDate = _codeModalDate;
        console.log('[Modal] calling updateAttendanceCode for', currentEmployeeId, isoDate);

        UI.callServer('updateAttendanceCode', [currentEmployeeId, isoDate, selected], function (response) {
          try {
            console.log('[Modal] updateAttendanceCode response:', response);
            console.log('[Modal] response type:', typeof response, 'keys:', response ? Object.keys(response) : 'null');
            // Success if response.ok OR if response.updatedCodes exists (meaning data was returned)
            if ((response && response.ok) || (response && response.updatedCodes)) {
              console.log('[Modal] save successful, invalidating cache');
              var cacheKey = currentEmployeeId + '_' + currentYear;
              delete calendarYearCache[cacheKey];
              console.log('[Modal] calling loadCalendarForEmployee');
              loadCalendarForEmployee(currentEmployeeId, currentYear);
              console.log('[Modal] closing modal');
              closeModal('attendanceCodeModal');
              console.log('[Modal] modal closed - save complete');
            } else {
              var errMsg = '';
              if (!response) {
                errMsg = 'No response from server';
              } else if (response.error) {
                errMsg = response.error;
              } else if (response.message) {
                errMsg = response.message;
              } else {
                errMsg = 'unknown error (response: ' + JSON.stringify(response) + ')';
              }
              console.error('[Modal] Save failed:', errMsg);
              UI.showToast('Save failed: ' + errMsg, 'danger');
            }
          } catch (cbError) {
            console.error('[Modal] error in callback:', cbError);
            UI.showToast('Error: ' + cbError.toString(), 'danger');
          }
        });
      } catch (error) {
        console.error('[Modal] error in saveCodeModal_:', error);
        UI.showToast('Save error: ' + error.toString(), 'danger');
      }
    }

    function openAttendanceCalendar(employeeId) {
      var emp = employeeCache.find(function (e) { return e.id === employeeId; });
      if (!emp) {
        UI.showToast('Employee not found.', 'error');
        return;
      }

      var attendanceLink = document.querySelector('.nav-link[data-view="attendance"]');
      if (!attendanceLink) return;

      attendanceLink.click();
      setTimeout(function () {
        AttendanceCalendar.selectEmployee(emp.id, emp.name);
      }, 0);
    }

    function setEmployeeCache(employees) {
      employeeCache = employees;
    }

    return { onShow, loadActiveCNs, selectEmployee, clearSelection, loadCalendarForEmployee, prevYear, nextYear, openAttendanceCalendar, setEmployeeCache };
  })();

  function loadDeptSettings(dept) {

  function renderDeptSettings(data) {
    var reqBody = document.getElementById('staffingReqsBody');

      reqBody.innerHTML = (data.staffingReqs || []).map(function (req) {
        return `<tr>
          <td>${esc(req.day)}</td>
          <td><input type="number" class="form-control form-control-sm staffing-count" value="${req.count || 0}" data-day="${esc(req.day)}" style="width:70px;"></td>
          <td><select class="form-select form-select-sm staffing-mode" data-day="${esc(req.day)}">

            <option value="Hours"${req.mode === 'Hours' ? ' selected' : ''}>Hours</option>
          </select></td>
        </tr>`;
      }).join('');

        + '<td><input type="text" class="form-control form-control-sm" value="' + esc(roleName) + '"></td>'

        + '<td><input type="number" class="form-control form-control-sm" value="' + (entry.Moderate || 0) + '" min="0"></td>'
        + '<td><input type="number" class="form-control form-control-sm" value="' + (entry.High || 0) + '" min="0"></td>'
        + '<td><button class="btn btn-sm btn-outline-danger" onclick="this.closest(\'tr\').remove()">✕</button></td>'

      + '<td><input type="time" class="form-control form-control-sm shift-sun-start" value="' + esc(s.sunStart || '') + '" title="Sunday start (blank = same as weekday)"></td>'

      + '<td><input type="time" class="form-control form-control-sm shift-flex-earliest" value="' + esc(s.flexWindowEarliest || '') + '" placeholder="Earliest"></td>'
      + '<td><input type="time" class="form-control form-control-sm shift-flex-latest" value="' + esc(s.flexWindowLatest || '') + '" placeholder="Latest"></td>'
      + '<td><button type="button" class="btn btn-outline-danger btn-sm btn-delete-shift">&#x2715;</button></td>'
      + '</tr>';

  function wireDeleteButtons() {
    document.querySelectorAll('.btn-delete-shift').forEach(function (btn) {
      btn.onclick = function () {
        btn.closest('tr').remove();
      };
    });
  }

  function collectStaffingReqsFromDom() {
    var staffingReqs = [];
    document.querySelectorAll('#staffingReqsBody tr').forEach(function (tr) {
      var day = tr.querySelector('.staffing-count').dataset.day;
      var count = parseFloat(tr.querySelector('.staffing-count').value) || 0;
      var mode = tr.querySelector('.staffing-mode').value;
      staffingReqs.push({ day, count, mode });
    });
    return staffingReqs;
  }

  function collectShiftsFromDom() {
    var shifts = [];
    document.querySelectorAll('#shiftDefsBody tr').forEach(function (tr) {
      var name = tr.querySelector('.shift-name').value.trim();
      var ftpt = tr.querySelector('.shift-ftpt').value;
      var weekdayStart = tr.querySelector('.shift-weekday-start').value || '';
      var satStart = tr.querySelector('.shift-sat-start').value || '';
      var sunStart = tr.querySelector('.shift-sun-start').value || '';
      var paidHours = parseFloat(tr.querySelector('.shift-hours').value) || 0;
      var hasLunch = tr.querySelector('.shift-lunch').checked;
      var flexEnabledEl = tr.querySelector('.shift-flex-enabled');
      var flexEnabled = flexEnabledEl ? flexEnabledEl.checked : true;
      var flexWindowEarliest = tr.querySelector('.shift-flex-earliest').value || '';

      var fileInput = document.getElementById('ukgFileInput');
      if (!fileInput.files || !fileInput.files[0]) {

        return;
      }
      var reader = new FileReader();
      reader.onload = function (e) {
        var rows = parseUkgCsv_(e.target.result);
        if (rows.length === 0) {
          UI.showToast('No valid rows found in the CSV.', 'error');
          return;
        }
        UI.callServer('importFromUKG', [rows], function (data) {

            + ', Updated: ' + data.updated
