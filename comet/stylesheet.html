<style>
  /* =========================================================================
     COMET — Custom Stylesheet
     Loaded via <?!= include('stylesheet') ?> in index.html.
     Bootstrap 5 CDN is loaded first; these rules extend and override it.
     ========================================================================= */


  /* -------------------------------------------------------------------------
     Bootstrap 5 CDN
     ------------------------------------------------------------------------- */
  /* Inline link tag so GAS include() injects it in <head> alongside custom CSS */
</style>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous">
<style>

  /* -------------------------------------------------------------------------
     Root Variables
     ------------------------------------------------------------------------- */
  :root {
    --comet-navy:       #005DAA;   /* Costco blue */
    --comet-blue:       #E31837;   /* Costco red — primary action color */
    --comet-blue-hover: #C01230;   /* Costco red darkened */
    --comet-surface:    #F8F9FB;
    --comet-border:     #E2E8F0;
    --comet-text:       #1E293B;
    --comet-muted:      #64748B;
  }


  /* -------------------------------------------------------------------------
     Base
     ------------------------------------------------------------------------- */
  body {
    background-color: var(--comet-surface);
    color: var(--comet-text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 0.9rem;
  }


  /* -------------------------------------------------------------------------
     Navbar
     ------------------------------------------------------------------------- */
  .comet-navbar {
    background-color: var(--comet-navy);
    padding: 0.5rem 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  .comet-brand {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #fff !important;
  }

  .comet-logo-icon {
    margin-right: 0.35rem;
    color: #E31837;
  }

  .comet-navbar .nav-link {
    color: rgba(255,255,255,0.75) !important;
    font-weight: 500;
    padding: 0.55rem 1.4rem;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }

  .comet-navbar .nav-link:hover,
  .comet-navbar .nav-link.active {
    color: #fff !important;
    background-color: rgba(255,255,255,0.12);
  }


  /* -------------------------------------------------------------------------
     Main Content Area
     ------------------------------------------------------------------------- */
  .comet-main {
    padding: 1.75rem 2rem;
    min-height: calc(100vh - 56px);
  }

  @media (max-width: 576px) {
    .comet-main {
      padding: 1rem;
    }
  }


  /* -------------------------------------------------------------------------
     View Sections
     ------------------------------------------------------------------------- */
  .comet-view {
    animation: comet-fade-in 0.18s ease;
  }

  @keyframes comet-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .comet-view-header {
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--comet-border);
  }

  .comet-view-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
  }


  /* -------------------------------------------------------------------------
     Tables
     ------------------------------------------------------------------------- */
  .comet-table-container {
    background: #fff;
    border: 1px solid var(--comet-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .comet-table-container table {
    margin: 0;
    font-size: 0.85rem;
  }

  .comet-table-container thead th {
    background-color: var(--comet-navy);
    color: #fff;
    font-weight: 600;
    border-color: var(--comet-navy);
    white-space: nowrap;
  }

  .comet-table-container tbody tr:hover {
    background-color: #EFF6FF;
  }

  /* CN expiry color coding */
  .cn-expiry-green  { background-color: #D1FAE5 !important; }
  .cn-expiry-amber  { background-color: #FEF3C7 !important; }
  .cn-expiry-red    { background-color: #FEE2E2 !important; }


  /* -------------------------------------------------------------------------
     Cards (Admin view)
     ------------------------------------------------------------------------- */
  .card {
    border: 1px solid var(--comet-border);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .card-header {
    background-color: #F1F5F9;
    border-bottom: 1px solid var(--comet-border);
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
  }


  /* -------------------------------------------------------------------------
     Loading Overlay
     ------------------------------------------------------------------------- */
  .comet-loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1050;
  }


  /* -------------------------------------------------------------------------
     Toast (success / error variants)
     ------------------------------------------------------------------------- */
  #cometToast.toast-success {
    background-color: #166534;
    color: #fff;
  }

  #cometToast.toast-error {
    background-color: #991B1B;
    color: #fff;
  }

  #cometToast.toast-info {
    background-color: var(--comet-navy);
    color: #fff;
  }


  /* -------------------------------------------------------------------------
     Schedule Grid
     ------------------------------------------------------------------------- */
  .comet-schedule-table {
    font-size: 0.8rem;
    table-layout: fixed;
    min-width: 760px;
  }

  .comet-schedule-table th,
  .comet-schedule-table td {
    vertical-align: middle;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .comet-schedule-table thead th {
    background-color: var(--comet-navy);
    color: #fff;
    font-weight: 600;
    text-align: center;
  }

  .comet-schedule-table thead th:first-child {
    text-align: left;
    min-width: 160px;
  }

  .schedule-cell { padding: 4px 2px !important; }

  .schedule-cell-ft   { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #DBEAFE; color: #1E40AF; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-pt   { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #DCFCE7; color: #166534; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-vac  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #FEF9C3; color: #854D0E; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-rdo  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #E2E8F0; color: #475569; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-off  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #F1F5F9; color: #94A3B8; font-size: 0.75rem; }
  .schedule-cell-role { color: #6B7280; font-size: 0.7rem; }

  .schedule-row-ft td:first-child { border-left: 3px solid #3B82F6; }
  .schedule-row-pt td:first-child { border-left: 3px solid #22C55E; }

  .schedule-coverage-row td { font-size: 0.78rem; }

  .cn-badge { font-size: 0.55rem; vertical-align: super; cursor: help; line-height: 1; }

  /* Scrollable schedule wrapper on small screens */
  #scheduleTableContainer { overflow-x: auto; }


  /* -------------------------------------------------------------------------
     Utility
     ------------------------------------------------------------------------- */
  .text-comet-muted {
    color: var(--comet-muted);
  }

  .btn-primary {
    background-color: var(--comet-blue);
    border-color: var(--comet-blue);
  }

  .btn-primary:hover {
    background-color: var(--comet-blue-hover);
    border-color: var(--comet-blue-hover);
  }

</style>
