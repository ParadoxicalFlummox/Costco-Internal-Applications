     Bootstrap 5 CDN is loaded first; these rules extend and override it.

<style>

  /* -------------------------------------------------------------------------
     Root Variables
     ------------------------------------------------------------------------- */
  :root {
    --comet-navy:       #005DAA;   /* Costco blue */
    --comet-blue:       #E31837;   /* Costco red — primary action color */
    --comet-blue-hover: #C01230;   /* Costco red darkened */
    --comet-surface:    #F8F9FB;
    --comet-border:     #E2E8F0;
    --comet-text:       #1E293B;
    --comet-muted:      #64748B;
  }


  /* -------------------------------------------------------------------------
     Base
     ------------------------------------------------------------------------- */
  body {
    background-color: var(--comet-surface);
    color: var(--comet-text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 0.9rem;
  }


  /* -------------------------------------------------------------------------
     Navbar
     ------------------------------------------------------------------------- */
  .comet-navbar {
    background-color: var(--comet-navy);
    padding: 0.5rem 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  .comet-brand {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #fff !important;
  }

  .comet-logo-icon {
    margin-right: 0.35rem;
    color: #E31837;
  }

  .comet-navbar .nav-link {
    color: rgba(255,255,255,0.75) !important;
    font-weight: 500;
    padding: 0.55rem 1.4rem;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }

  .comet-navbar .nav-link:hover,
  .comet-navbar .nav-link.active {
    color: #fff !important;
    background-color: rgba(255,255,255,0.12);
  }


  /* -------------------------------------------------------------------------
     Main Content Area
     ------------------------------------------------------------------------- */
  .comet-main {
    padding: 1.75rem 2rem;
    min-height: calc(100vh - 56px);
  }

  @media (max-width: 576px) {
    .comet-main {
      padding: 1rem;
    }
  }


  /* -------------------------------------------------------------------------
     View Sections
     ------------------------------------------------------------------------- */
  .comet-view {
    animation: comet-fade-in 0.18s ease;
  }

  @keyframes comet-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .comet-view-header {
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--comet-border);
  }

  .comet-view-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
  }


  /* -------------------------------------------------------------------------
     Tables
     ------------------------------------------------------------------------- */
  .comet-table-container {
    background: #fff;
    border: 1px solid var(--comet-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .comet-table-container table {
    margin: 0;
    font-size: 0.85rem;
  }

  .comet-table-container thead th {
    background-color: var(--comet-navy);
    color: #fff;
    font-weight: 600;
    border-color: var(--comet-navy);
    white-space: nowrap;
  }

  .comet-table-container tbody tr:hover {
    background-color: #EFF6FF;
  }

  /* CN expiry color coding */
  .cn-expiry-green  { background-color: #D1FAE5 !important; }
  .cn-expiry-amber  { background-color: #FEF3C7 !important; }
  .cn-expiry-red    { background-color: #FEE2E2 !important; }


  /* -------------------------------------------------------------------------
     Cards (Admin view)
     ------------------------------------------------------------------------- */
  .card {
    border: 1px solid var(--comet-border);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .card-header {
    background-color: #F1F5F9;
    border-bottom: 1px solid var(--comet-border);
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
  }


  /* -------------------------------------------------------------------------
     Loading Overlay
     ------------------------------------------------------------------------- */
  .comet-loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1050;
  }


  /* -------------------------------------------------------------------------
     Toast (success / error variants)
     ------------------------------------------------------------------------- */
  #cometToast.toast-success {
    background-color: #166534;
    color: #fff;
  }

  #cometToast.toast-error {
    background-color: #991B1B;
    color: #fff;
  }

  #cometToast.toast-info {
    background-color: var(--comet-navy);
    color: #fff;
  }


  /* -------------------------------------------------------------------------
     Schedule Grid
     ------------------------------------------------------------------------- */
  .comet-schedule-table {
    font-size: 0.8rem;
    table-layout: fixed;
    min-width: 760px;
  }

  .comet-schedule-table th,
  .comet-schedule-table td {
    vertical-align: middle;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .comet-schedule-table thead th {
    background-color: var(--comet-navy);
    color: #fff;
    font-weight: 600;
    text-align: center;
  }

  .comet-schedule-table thead th:first-child {
    text-align: left;
    min-width: 160px;
  }

  .schedule-cell { padding: 4px 2px !important; }

  .schedule-cell-ft   { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #DBEAFE; color: #1E40AF; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-pt   { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #DCFCE7; color: #166534; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-lpt  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #FFF7ED; color: #9A3412; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-vac  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #FEF9C3; color: #854D0E; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-rdo  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #E2E8F0; color: #475569; font-weight: 600; font-size: 0.75rem; }
  .schedule-cell-off  { display: inline-block; padding: 2px 5px; border-radius: 4px;
                        background: #F1F5F9; color: #94A3B8; font-size: 0.75rem; }
  .schedule-cell-role { color: #6B7280; font-size: 0.7rem; }

  /* Lock badge indicator for manager-overridden cells */
  .lock-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    font-size: 0.65rem;
    cursor: help;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
  }

  /* Change highlighting animation for override cells */
  @keyframes fadeFromYellow {
    0% { background-color: #FFD966 !important; }
    100% { background-color: inherit; }
  }
  .schedule-cell-changed {
    animation: fadeFromYellow 2s ease-out forwards;
  }

  /* Role text pill on shift cells */
  .role-badge {
    display: inline-block;
    margin-top: 2px;
    padding: 0 5px;
    font-size: 0.6rem;
    font-weight: 600;
    border-radius: 4px;
    line-height: 1.4;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  /* Front End — blue / cyan / purple family */
  .role-badge-cashier              { background-color: #DBEAFE; color: #1E40AF; }
  .role-badge-assistant            { background-color: #BFDBFE; color: #1E40AF; }
  .role-badge-sco                  { background-color: #BAE6FD; color: #0369A1; }
  .role-badge-liquor               { background-color: #A5F3FC; color: #0E7490; }
  .role-badge-prescan              { background-color: #EDE9FE; color: #5B21B6; }
  .role-badge-go-backs             { background-color: #F5D0FE; color: #86198F; }
  .role-badge-carts                { background-color: #CBD5E1; color: #334155; }
  .role-badge-floater              { background-color: #FEF08A; color: #713F12; }

  /* Merchandising — green / indigo family */
  .role-badge-morning              { background-color: #D1FAE5; color: #065F46; }
  .role-badge-night                { background-color: #C7D2FE; color: #3730A3; }
  .role-badge-produce              { background-color: #BBF7D0; color: #166534; }
  .role-badge-stocker              { background-color: #ECFDF5; color: #065F46; }
  .role-badge-driver               { background-color: #FDBA74; color: #7C2D12; }

  /* Bakery / Food — rose and warm yellow */
  .role-badge-bakery               { background-color: #FECACA; color: #991B1B; }
  .role-badge-deli                 { background-color: #FDE68A; color: #92400E; }
  .role-badge-food-service         { background-color: #FDE68A; color: #92400E; }
  .role-badge-food-court           { background-color: #FDE68A; color: #92400E; }

  /* Maintenance — amber */
  .role-badge-maintenance-associate { background-color: #FEF3C7; color: #92400E; }
  .role-badge-maintenance          { background-color: #FEF3C7; color: #92400E; }

  /* Other departments */
  .role-badge-receiving            { background-color: #A7F3D0; color: #065F46; }
  .role-badge-membership-service   { background-color: #FFFBEB; color: #92400E; }
  .role-badge-security             { background-color: #E2E8F0; color: #334155; }
  .role-badge-tire-tech            { background-color: #F0FDF4; color: #166534; }
  .role-badge-gas-attendant        { background-color: #FFEDD5; color: #9A3412; }
  .role-badge-pharmacy-tech        { background-color: #F3E8FF; color: #6B21A8; }
  .role-badge-optician             { background-color: #F0F9FF; color: #0369A1; }
  .role-badge-hearing-specialist   { background-color: #FFF0F5; color: #9D174D; }

  /* Leadership */
  .role-badge-lead                 { background-color: #FEE2E2; color: #991B1B; }
  .role-badge-supervisor           { background-color: #FCE7F3; color: #9D174D; }

  /* Priority role badge in the employee name cell */
  .role-priority-badge {
    display: inline-block;
    padding: 0 5px;
    font-size: 0.6rem;
    font-weight: 600;
    border-radius: 4px;
    line-height: 1.4;
    vertical-align: middle;
  }
  /* Qualified roles list under the employee name */
  .role-qualified-list {
    display: block;
    font-size: 0.65rem;
    color: #6B7280;
    margin-top: 1px;
  }

  .schedule-row-ft  td:first-child { border-left: 3px solid #3B82F6; }
  .schedule-row-pt  td:first-child { border-left: 3px solid #22C55E; }
  .schedule-row-lpt td:first-child { border-left: 3px solid #F97316; }

  .schedule-coverage-row td { font-size: 0.78rem; }

  .cn-badge { font-size: 0.55rem; vertical-align: super; cursor: help; line-height: 1; }

  /* Cross-department hours badge (split-shift scheduling) */
  .cross-dept-badge {
    display: inline-block;
    padding: 2px 4px;
    margin-left: 4px;
    background-color: #f5f5f5;
    color: #666;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: help;
    border: 1px solid #e0e0e0;
  }

  /* Scrollable schedule wrapper on small screens */
  #scheduleTableContainer { overflow-x: auto; }


  /* -------------------------------------------------------------------------
     Utility
     ------------------------------------------------------------------------- */
  .text-comet-muted {
    color: var(--comet-muted);
  }

  .btn-primary {
    background-color: var(--comet-blue);
    border-color: var(--comet-blue);
  }

  .btn-primary:hover {
    background-color: var(--comet-blue-hover);
    border-color: var(--comet-blue-hover);
  }

</style>
